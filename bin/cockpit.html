<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>claude-stray · 注意力驾驶舱 (DD-015 原型)</title>
<style>
  :root{
    --bg:#141417; --bg-elev:#1b1b21; --bg-row:#191920; --bg-row-hover:#20212a;
    --hair:#2a2a32; --hair-soft:#232329;
    --ink:#eae8e2; --ink-dim:#9a9aa6; --ink-faint:#62626c;
    --needs:#ffb454; --needs-edge:#ff9f43; --needs-bg:rgba(255,168,64,.065);
    --run:#56d3b6; --run-bg:rgba(86,211,182,.05);
    --idle:#7c7c88; --done:#74b07f; --paused:#6b6b76;
    --mr:#6fb4e8; --cr:#bd92e6; --cd:#e0a36b;
    --proj-open:rgba(255,255,255,.028); --connector:#34343e;
    --topbar-bg:rgba(20,20,23,.92); --disc-bg:rgba(20,20,23,.85);
    --needs-glow:rgba(255,168,64,.5); --run-glow:rgba(86,211,182,.6);
    --mono:ui-monospace,"SF Mono","JetBrains Mono",Menlo,Consolas,monospace;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;
  }
  html[data-theme="light"]{
    --bg:#f5f3ee; --bg-elev:#ffffff; --bg-row:#ffffff; --bg-row-hover:#efece4;
    --hair:#d7d2c6; --hair-soft:#e4e0d6;
    --ink:#191b21; --ink-dim:#474c57; --ink-faint:#7a7b85;
    --needs:#a8650f; --needs-edge:#bd7518; --needs-bg:rgba(168,101,15,.10);
    --run:#147a68; --run-bg:rgba(20,122,104,.10);
    --idle:#73747e; --done:#2f8245; --paused:#86868f;
    --mr:#235f9f; --cr:#6a44a0; --cd:#94600f;
    --proj-open:#efece3; --connector:#cbc5b7;
    --topbar-bg:rgba(245,243,238,.92); --disc-bg:rgba(245,243,238,.92);
    --needs-glow:rgba(168,101,15,.28); --run-glow:rgba(20,122,104,.3);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:var(--bg);color:var(--ink);font-family:var(--sans);-webkit-font-smoothing:antialiased;font-size:14px;line-height:1.45}
  a{color:inherit;text-decoration:none}

  /* topbar */
  .topbar{position:sticky;top:0;z-index:20;background:var(--topbar-bg);backdrop-filter:blur(8px);
    border-bottom:1px solid var(--hair);display:flex;align-items:center;gap:28px;padding:13px 28px}
  .brand{display:flex;align-items:baseline;gap:9px;white-space:nowrap}
  .brand .mark{width:9px;height:9px;border-radius:2px;background:var(--needs);box-shadow:0 0 8px 1px var(--needs-glow);transform:translateY(1px)}
  .brand .name{font-family:var(--mono);font-size:13px;letter-spacing:.04em;color:var(--ink-dim)}
  .brand .sub{font-size:12px;color:var(--ink-faint)}
  .hud{display:flex;align-items:baseline;gap:20px;margin-left:4px}
  .hud .stat{display:flex;align-items:baseline;gap:6px}
  .hud .n{font-family:var(--mono);font-size:21px;font-weight:600;letter-spacing:-.01em}
  .hud .lbl{font-size:12.5px;color:var(--ink-dim)}
  .hud .sep{color:var(--hair);font-size:16px}
  .hud .k-needs .n,.hud .k-needs .lbl{color:var(--needs)} .hud .k-run .n{color:var(--run)} .hud .k-idle .n{color:var(--idle)} .hud .k-dun .n,.hud .k-dun .lbl{color:var(--done)}
  .topbar .right{margin-left:auto;display:flex;align-items:center;gap:14px}
  .viewtog{display:flex;border:1px solid var(--hair);border-radius:6px;overflow:hidden}
  .viewtog button{font-family:var(--sans);font-size:12px;padding:5px 12px;background:transparent;color:var(--ink-dim);border:none;border-right:1px solid var(--hair);cursor:pointer}
  .viewtog button:last-child{border-right:none}
  .viewtog button.on{background:var(--bg-elev);color:var(--ink)}
  .clock{font-family:var(--mono);font-size:12px;color:var(--ink-faint);white-space:nowrap}
  .mocktag{font-size:11px;color:var(--ink-faint);border:1px dashed var(--hair);border-radius:4px;padding:3px 8px;white-space:nowrap}

  /* mindmap nav (全部 → 项目 → 任务) */
  .minimap{max-width:1080px;margin:0 auto;padding:10px 24px 0}
  body[data-view="attention"] .minimap{display:none}
  .mind-head{font-family:var(--mono);font-size:11px;letter-spacing:.06em;color:var(--ink-faint);cursor:pointer;display:inline-flex;gap:7px;align-items:center;padding:4px 2px;user-select:none}
  .mind-head:hover{color:var(--ink-dim)} .mind-head .mh-chev{transition:transform .15s}
  .minimap.mclosed .mh-chev{transform:rotate(-90deg)} .minimap.mclosed .mind{display:none}
  .mind{position:relative;display:flex;align-items:center;gap:56px;padding:12px 4px 8px;overflow-x:auto}
  .mind-links{position:absolute;left:0;top:0;width:100%;height:100%;pointer-events:none;z-index:0}
  .mind-root{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;gap:2px;font-family:var(--mono);font-size:10.5px;color:var(--ink-faint);border:1px solid var(--hair);border-radius:9px;padding:9px 13px;background:var(--bg-row);flex:none}
  .mind-root b{font-size:17px;color:var(--ink);font-weight:600}
  .mind-branches{position:relative;z-index:1;display:flex;flex-direction:column;gap:9px}
  .mbranch{display:flex;align-items:center;gap:16px}
  .mnode{display:inline-flex;align-items:center;gap:8px;border:1px solid var(--hair);border-radius:8px;padding:7px 11px;background:var(--bg-row);cursor:pointer;white-space:nowrap;flex:none;transition:border-color .12s}
  .mnode:hover{border-color:var(--ink-faint)} .mnode[data-urg="2"]{border-color:rgba(255,168,64,.4);background:var(--needs-bg)}
  .mnode .mname{font-family:var(--mono);font-size:11.5px;color:var(--ink);max-width:150px;overflow:hidden;text-overflow:ellipsis}
  .mnode .mc{font-size:10.5px;color:var(--ink-faint)}
  .mleaves{display:flex;gap:6px;flex-wrap:wrap;max-width:540px}
  .mleaf{display:inline-flex;align-items:center;gap:5px;font-size:10.5px;color:var(--ink-dim);border:1px solid var(--hair-soft);border-radius:5px;padding:2px 8px;background:var(--bg);max-width:160px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer}
  .mleaf:hover{border-color:var(--ink-faint);color:var(--ink)}

  /* animated status icons */
  .sic{display:inline-flex;align-items:center;justify-content:center;position:relative;flex:none;vertical-align:middle}
  .row>.sic,.proj-head>.sic{justify-self:center}
  .spin{animation:spin .9s linear infinite;transform-origin:center}
  @keyframes spin{to{transform:rotate(360deg)}}
  .ndot .core{position:absolute;inset:26%;border-radius:50%;background:var(--needs);box-shadow:0 0 6px 1px var(--needs-glow)}
  .ndot .ping{position:absolute;inset:8%;border-radius:50%;border:1.5px solid var(--needs);animation:ping 1.7s cubic-bezier(0,0,.2,1) infinite}
  @keyframes ping{0%{transform:scale(.5);opacity:.9}80%,100%{transform:scale(1.6);opacity:0}}
  .idot{border-radius:50%;border:1.6px solid var(--idle);box-sizing:border-box}

  /* board */
  .board{max-width:1080px;margin:0 auto;padding:8px 24px 80px}

  /* attention bands */
  .band{margin-top:18px}
  .band-head{display:flex;align-items:center;gap:10px;padding:6px 8px;user-select:none}
  .band-head .glyph{font-size:13px;width:16px;text-align:center}
  .band-head .htxt{font-size:12.5px;letter-spacing:.06em;font-weight:600}
  .band-head .cnt{font-family:var(--mono);font-size:12px;color:var(--ink-faint)}
  .band-head .rule{flex:1;height:1px;background:var(--hair-soft)}
  .band-head .chev{font-size:11px;color:var(--ink-faint);transition:transform .15s}
  .band-head.clickable{cursor:pointer}
  .band.collapsed .chev{transform:rotate(-90deg)} .band.collapsed .rows{display:none}
  .band[data-band="needs_you"] .band-head .glyph,.band[data-band="needs_you"] .band-head .htxt{color:var(--needs)}
  .band[data-band="running"] .band-head .glyph,.band[data-band="running"] .band-head .htxt{color:var(--run)}
  .band[data-band="idle"] .band-head .glyph,.band[data-band="idle"] .band-head .htxt{color:var(--idle)}
  .band[data-band="done"] .band-head .glyph,.band[data-band="done"] .band-head .htxt{color:var(--done)}
  .band[data-band="paused"] .band-head .glyph,.band[data-band="paused"] .band-head .htxt{color:var(--paused)}
  .band[data-band="done_unread"] .band-head .glyph,.band[data-band="done_unread"] .band-head .htxt{color:var(--done)}
  .sic.dchk{animation:dpulse 1.8s ease-in-out infinite}
  @keyframes dpulse{0%,100%{opacity:1}50%{opacity:.5}}
  .mid.dunread{color:var(--done)}
  .pcounts .gdone{color:var(--done)}
  .row[data-band="done_unread"]{box-shadow:inset 3px 0 0 var(--done)}

  /* tiers */
  .tier-head{display:flex;align-items:center;gap:11px;font-family:var(--mono);font-size:11px;letter-spacing:.12em;
    color:var(--ink-faint);text-transform:uppercase;margin:20px 8px 4px;user-select:none}
  .tier-head .tx{white-space:nowrap}
  .tier-head::after{content:'';flex:1;height:1px;background:var(--hair-soft)}
  .tier-head.side{opacity:.75}
  .zone[data-tier="side"] .proj-head{padding:9px 12px}
  .zone[data-tier="side"] .pname{color:var(--ink-dim)}

  /* project stream line */
  .proj{margin-top:4px;border:1px solid transparent;border-radius:10px;background:transparent;transition:background .14s}
  .proj.dragging{opacity:.45}
  .proj.flash{outline:1px solid var(--needs-edge);outline-offset:-1px}
  .proj-head{display:grid;grid-template-columns:18px 14px 11px minmax(96px,168px) auto 1fr auto;
    align-items:center;gap:11px;padding:12px 12px;border-radius:9px;cursor:pointer;transition:background .12s;min-height:46px}
  .proj-head:hover{background:var(--bg-row-hover)}
  .dragh{justify-self:center;color:var(--hair);font-size:13px;cursor:grab;line-height:1}
  .proj-head:hover .dragh{color:var(--ink-faint)}
  .proj-head .chev{font-size:11px;color:var(--ink-faint);justify-self:center;transition:transform .15s}
  .proj:not(.collapsed) .proj-head .chev{transform:rotate(90deg)}
  .pdot{width:9px;height:9px;border-radius:50%;justify-self:center}
  .pdot.needs_you{background:var(--needs);box-shadow:0 0 6px 0 rgba(255,168,64,.4)}
  .pdot.running{background:var(--run);animation:pulse 1.9s ease-in-out infinite}
  .pdot.idle{background:transparent;border:1.5px solid var(--idle)}
  .pname{font-family:var(--mono);font-size:13px;color:var(--ink);letter-spacing:.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .pcounts{font-size:11.5px;color:var(--ink-faint);white-space:nowrap}
  .pcounts .amb{color:var(--needs)} .pcounts .run{color:var(--run)} .pcounts .dim{color:var(--ink-faint)}
  .pstrip{display:flex;gap:6px;justify-self:end;flex-wrap:wrap;justify-content:flex-end;align-items:center;max-height:46px;overflow:hidden}
  .it{display:inline-flex;align-items:center;gap:5px;padding:3px 8px;border:1px solid var(--hair);border-radius:5px;
    font-size:11px;color:var(--ink-dim);max-width:140px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;background:var(--bg-row)}
  .it.more{color:var(--ink-faint);border-style:dashed}
  .ptimer{font-family:var(--mono);font-size:11.5px;color:var(--ink-faint);justify-self:end;white-space:nowrap}
  .proj-head[data-urg="2"]{box-shadow:inset 3px 0 0 var(--needs-edge);background:var(--needs-bg);border-radius:10px}
  .proj-head[data-urg="2"] .ptimer{color:var(--needs)}
  .proj-head[data-urg="2"]:hover{background:rgba(255,168,64,.1)}
  /* 展开:不是白框,而是一层极淡的区域底 + 主次连接线,凸显「正在看的这组」 */
  .proj:not(.collapsed){background:var(--proj-open);border-radius:11px;margin:11px 0;padding-bottom:7px}
  .proj:not(.collapsed) .proj-head{border-radius:11px 11px 0 0}
  .proj:not(.collapsed) .pstrip{display:none}
  /* 子任务挂在一条从父项目引下的 stream line 上,横向小枝连接每条 */
  .proj .rows{padding:3px 12px 2px 14px}
  .proj:not(.collapsed) .rows{margin-left:27px;padding-left:19px;border-left:1.5px solid var(--connector)}
  .proj:not(.collapsed) .rows .row{position:relative}
  .proj:not(.collapsed) .rows .row::before{content:'';position:absolute;left:-19px;top:50%;width:13px;height:1.5px;background:var(--connector)}
  .proj.collapsed .rows{display:none}
  @keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(86,211,182,0)}50%{box-shadow:0 0 8px 1px rgba(86,211,182,.6)}}

  /* row */
  .row{display:grid;grid-template-columns:14px minmax(168px,250px) 1fr auto 52px 30px;align-items:center;gap:13px;
    padding:9px 14px;border-radius:7px;cursor:pointer;border:1px solid transparent;transition:background .12s}
  .row:hover{background:var(--bg-row-hover)}
  .dot{width:9px;height:9px;border-radius:50%;justify-self:center}
  .dot.needs_you{background:var(--needs);box-shadow:0 0 6px 0 rgba(255,168,64,.4)}
  .dot.running{background:var(--run);animation:pulse 1.9s ease-in-out infinite}
  .dot.idle{background:transparent;border:1.5px solid var(--idle)}
  .dot.done{background:var(--done)} .dot.paused{background:transparent;border:1.5px solid var(--paused)}
  .name{min-width:0}
  .name .t{font-size:13.5px;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .name .ws{font-family:var(--mono);font-size:10.5px;color:var(--ink-faint);margin-top:1px;display:flex;align-items:center;gap:6px}
  .name .ws .lv{color:var(--hair);border:1px solid var(--hair);border-radius:3px;padding:0 4px;font-size:9.5px}
  body[data-view="project"] .name .ws{display:none}
  .mid{min-width:0;font-size:12.5px;color:var(--ink-dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:flex;align-items:center;gap:9px}
  .mid.needs_you{color:var(--needs)} .mid.idle{color:var(--ink-faint)}
  .mid .rtext{overflow:hidden;text-overflow:ellipsis}
  .bar{flex:none;width:64px;height:5px;border-radius:3px;background:var(--hair);overflow:hidden}
  .bar>i{display:block;height:100%;background:var(--run);border-radius:3px}
  .pct{font-family:var(--mono);font-size:11px;color:var(--run);flex:none}
  .chips{display:flex;gap:5px;align-items:center;justify-self:end;flex-wrap:nowrap}
  .chip{font-family:var(--mono);font-size:10.5px;line-height:1;padding:3px 6px;border:1px solid var(--hair);border-radius:4px;color:var(--ink-dim);white-space:nowrap;display:inline-flex;gap:4px;align-items:center}
  .chip .k{font-weight:700} .chip.mr .k{color:var(--mr)} .chip.cr .k{color:var(--cr)} .chip.cd .k{color:var(--cd)}
  .chip.link:hover{border-color:var(--ink-faint);color:var(--ink)} .chip.more{color:var(--ink-faint);border-style:dashed}
  .timer{font-family:var(--mono);font-size:11.5px;color:var(--ink-faint);text-align:right;justify-self:end}
  .row[data-band="needs_you"] .timer{color:var(--needs)}
  .go{justify-self:center;width:26px;height:26px;border-radius:6px;border:1px solid var(--hair);color:var(--ink-faint);display:flex;align-items:center;justify-content:center;font-size:14px;transition:all .12s}
  .row:hover .go{border-color:var(--ink-faint);color:var(--ink);background:var(--bg-elev)}
  .row[data-band="needs_you"]{background:var(--needs-bg);box-shadow:inset 3px 0 0 var(--needs-edge)}
  .row[data-band="needs_you"]:hover{background:rgba(255,168,64,.11)}
  .row[data-band="running"]{background:var(--run-bg)}
  .row[data-band="idle"] .name .t{color:var(--ink-dim)}
  .row[data-band="done"],.row[data-band="paused"]{opacity:.72}

  /* expand */
  .detail{display:none;grid-column:1/-1;margin:2px 6px 10px 6px;padding:14px 16px;background:var(--bg-elev);border:1px solid var(--hair);border-radius:8px;border-left:3px solid var(--hair)}
  .row.open + .detail{display:block}
  .row[data-band="needs_you"].open + .detail{border-left-color:var(--needs-edge)}
  .row[data-band="running"].open + .detail{border-left-color:var(--run)}
  .detail .summary{font-size:12.5px;color:var(--ink-dim);margin-bottom:9px}
  .detail .fresh-tag{font-size:10.5px;color:var(--run);font-family:var(--mono);letter-spacing:.04em;margin-bottom:7px}
  .detail .await-line{font-size:12.5px;color:var(--needs);background:var(--needs-bg);border:1px solid var(--needs-edge);border-radius:7px;padding:7px 10px;margin:2px 0 8px;line-height:1.5}
  .detail .next-line{font-size:12.5px;color:var(--ink-dim);border-left:2px solid var(--run);padding:2px 0 2px 9px;margin:2px 0 9px;line-height:1.5}
  .detail .sealed-note{font-size:11.5px;color:var(--ink-faint);background:var(--proj-open);border:1px solid var(--hair-soft);border-radius:7px;padding:7px 9px;margin-bottom:10px;line-height:1.5}
  .detail .sealed-note code{font-family:var(--mono);font-size:10.5px;color:var(--ink-dim)}
  .name .ws .lv.sealed{color:var(--ink-faint);border-color:var(--hair-soft)}
  .row.is-sealed .name .t{color:var(--ink-dim)}
  .detail .progress{font-size:13px;color:var(--ink);margin-bottom:12px;line-height:1.5}
  .detail .prog-steps{list-style:none;margin:2px 0 12px;padding:0;display:flex;flex-direction:column;gap:5px}
  .detail .prog-steps li{font-size:12.5px;color:var(--ink);padding-left:17px;position:relative;line-height:1.5}
  .detail .prog-steps li::before{content:'';position:absolute;left:3px;top:7px;width:5px;height:5px;border-radius:50%;background:var(--run);box-shadow:0 0 0 3px var(--run-bg)}
  .detail .prog-steps li:last-child{color:var(--ink);font-weight:500}
  .detail .sectit{font-family:var(--mono);font-size:10.5px;letter-spacing:.08em;color:var(--ink-faint);text-transform:uppercase;margin:11px 0 6px}
  .detail ul{list-style:none}
  .detail .blk{font-size:12.5px;color:var(--needs);padding:2px 0;display:flex;gap:8px}
  .detail .blk .b{color:var(--needs-edge)}
  .detail .meta{display:flex;gap:18px;flex-wrap:wrap;margin-top:6px;font-family:var(--mono);font-size:11px;color:var(--ink-faint)}
  .detail .acts{display:flex;gap:10px;margin-top:14px}
  .btn{font-size:12.5px;padding:7px 13px;border-radius:6px;border:1px solid var(--hair);background:var(--bg-row);color:var(--ink);cursor:pointer;font-family:var(--sans)}
  .btn.primary{background:rgba(255,168,64,.14);border-color:var(--needs-edge);color:var(--needs)}
  .btn:hover{border-color:var(--ink-faint)}
  .btn.danger{color:#d9694e} .btn.danger:hover{border-color:#d9694e;background:rgba(217,105,78,.08)}
  .acts-sp{flex:1}
  .detail .chips-full{display:flex;gap:10px;flex-wrap:wrap;margin-top:4px}
  .detail .res-noise{font-size:11px;color:var(--ink-faint);margin-top:6px}

  .disc{position:fixed;right:14px;bottom:12px;font-size:10.5px;color:var(--ink-faint);background:var(--disc-bg);backdrop-filter:blur(6px);border:1px dashed var(--hair);border-radius:5px;padding:5px 9px;max-width:300px;line-height:1.4;z-index:30}
  .iconbtn{font-size:14px;line-height:1;padding:5px 9px;border:1px solid var(--hair);border-radius:6px;background:transparent;color:var(--ink-dim);cursor:pointer}
  .iconbtn.spinning{animation:spin 1s linear infinite;color:var(--run);border-color:var(--run)}
  .iconbtn:hover{border-color:var(--ink-faint);color:var(--ink)}
  .disc b{color:var(--idle);font-weight:600}
  .toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(20px);background:var(--bg-elev);border:1px solid var(--hair);border-radius:7px;padding:9px 16px;font-size:12.5px;color:var(--ink);opacity:0;transition:all .2s;z-index:40;pointer-events:none}
  /* conversation history modal (DD-015 Stage 3a) */
  .histmask{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:60;display:flex;align-items:center;justify-content:center;padding:40px}
  .histbox{background:var(--bg-elev);border:1px solid var(--hair);border-radius:12px;max-width:760px;width:100%;max-height:82vh;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.4)}
  .histhead{display:flex;align-items:center;justify-content:space-between;padding:13px 18px;border-bottom:1px solid var(--hair);font-size:13px;color:var(--ink-dim);font-family:var(--mono)}
  .histbody{overflow-y:auto;padding:16px 18px;display:flex;flex-direction:column;gap:13px}
  .ht{max-width:82%}
  .ht.user{align-self:flex-end} .ht.assistant{align-self:flex-start}
  .ht-role{font-size:10.5px;color:var(--ink-faint);margin-bottom:3px;font-family:var(--mono)}

  .tl-txt{text-align:center;font-size:12.5px;line-height:1.6;color:var(--ink-dim)}

<body>
  <div class="topbar">
    <div class="brand"><span class="mark"></span><span class="name">claude-stray</span><span class="sub">· 注意力驾驶舱</span></div>
    <div class="hud" id="hud"></div>
    <div class="right">
      <button class="iconbtn" id="refreshBtn" title="刷新(增量):抓取新会话 + 最近更新的会话并重新分类。全量导入历史用 stray --backfill">⟳</button>
      <button class="iconbtn" id="themetog" title="切换昼夜模式">☾</button>
      <div class="viewtog" id="viewtog"><button data-v="project">按项目</button><button data-v="attention">按注意力</button><button data-v="archive">归档</button></div>
      <a class="iconbtn" href="/classic" title="经典卡片视图" style="text-decoration:none">⊞</a>
      <span class="clock" id="clock"></span>
      
    </div>
  </div>
  <div class="minimap" id="minimap"></div>
  <div class="board" id="board"></div>
  <div class="disc" id="disc"></div>
  <div class="toast" id="toast"></div>

  
  <script>
  const ORIGIN = location.origin;
  let DATA = {counts:{}, rows:[]};
  let LOCATIONS = {};        // session_id -> {zellij_pane_id, zellij_session, cwd}
  const OPEN = new Set();   // expanded initiative ids — preserved across re-renders
  const PCOLLAPSE = {};      // ws -> 'o'|'c' : manual project collapse override
  let lastSig = null;        // skip re-render when nothing actually changed
  let MINDMAP = {workspaces:[]};
  let LIVE = {};
  let SYNC = {};            // first-sync health {state,reason,log_tail} from /api/data
  let CLAUDE_OK = true;     // is the `claude` CLI available (precondition for sync)
  const NEEDS_RE = /待用户|待 ?user|用户确认|用户决定|用户反馈|需确认|待确认|权限确认|等你/;
  function humanIdle(iso){ if(!iso) return ''; const u=Date.parse(iso); if(isNaN(u)) return '';
    let s=(Date.now()-u)/1000; if(s<0)s=0;
    if(s<3600) return Math.floor(s/60)+'m'; if(s<86400) return Math.floor(s/3600)+'h'; return Math.floor(s/86400)+'天'; }
  function idleSecs(iso){ const u=Date.parse(iso); return isNaN(u)?0:Math.max(0,(Date.now()-u)/1000); }
  // band = real status + live telemetry + blocker text (DD-015)
  function bandFor(init){
    // DD-019: sealed historical cards are frozen achievements (no live
    // session); they live in the collapsible done/archive band.
    if(init.sealed) return {band:'done'};
    const sids=init.sessions||[]; let run=false,need=false,dun=false,idle=false,since=null,reason=null;
    for(const s of sids){ const r=LIVE[s]; if(!r)continue;
      if(r.status==='needs_you'){need=true; reason=r.reason; since=r.status_since||since;}
      else if(r.status==='running'){run=true; since=r.status_since||since;}
      else if(r.status==='done_unread'){dun=true; if(!since)since=r.status_since;}
      else if(r.status==='idle'){ // a still-open session, only "live" if recent
        const u=Date.parse(r.status_since||''); if(!isNaN(u)&&(Date.now()-u)<24*3600000){idle=true; if(!since)since=r.status_since;} } }
    // Live telemetry WINS over a stale classify status. A session that is
    // running / waiting-on-you / freshly-finished / still-open(idle) is NOT
    // "done & filed away" — so it must not collapse into 已完成 just because
    // classify marked status==='done' from the last turn's status_guess.
    if(need) return {band:'needs_you', reason:reason||init.awaiting_user||'等你确认下一步', since};
    if(run) return {band:'running', activity:'AI 进行中', since};
    // DD-020: awaiting_user is the strongest non-live signal — the last turn
    // ended blocked on you. It outranks done_unread ("待查看") and the old
    // blocker-text regex.
    if(init.awaiting_user) return {band:'needs_you', reason:init.awaiting_user, since};
    if(dun) return {band:'done_unread', reason:'AI 已完成,待你查看', since};
    // Only let 'done'/'paused' collapse the card when the session ISN'T still open.
    if(!idle){
      if(init.status==='done') return {band:'done'};
      if(init.status==='paused'){
        // recently-touched parked work still shows (as idle); only long-dormant
        // paused collapses — so "近期的" cards aren't hidden.
        const iso=init.last_activity_at; const days=iso?(Date.now()-Date.parse(iso))/86400000:999;
        return days<=4 ? {band:'idle'} : {band:'paused'};
      }
    }
    const blk=(init.blockers||[]).find(b=>NEEDS_RE.test(b));
    if(blk) return {band:'needs_you', reason:blk};
    return {band:'idle'};
  }
  function buildRows(){
    const rows=[];
    for(const w of (MINDMAP.workspaces||[])){ for(const init of (w.initiatives||[])){
      const b=bandFor(init); const iso=b.since||init.last_activity_at; const tasks=init.tasks||[];
      rows.push({ id:init.id, name:init.name, ws:w.name, status:init.status, level:init.level,
        band:b.band, reason:b.reason, activity:b.activity, pct:b.pct,
        idle:humanIdle(iso), idle_secs:idleSecs(iso),
        artifacts:init.artifacts||[], blockers:init.blockers||[],
        tasks_total:tasks.length, tasks_pending:tasks.filter(x=>(x.status||(x.done?'done':'pending'))==='pending').length,
        sessions:init.sessions||[], n_sessions:(init.sessions||[]).length,
        session:(init.sessions||[])[0]||init.origin_session||null,
        sealed:!!init.sealed, origin_session:init.origin_session||null, fresh:!!init._fresh,
        next_step:init.next_step||null, awaiting_user:init.awaiting_user||null,
        progress:init.progress, summary:init.summary });
    }}
    rows.sort((a,b)=>RANK[a.band]-RANK[b.band]||b.idle_secs-a.idle_secs);
    const counts={}; rows.forEach(r=>counts[r.band]=(counts[r.band]||0)+1);
    DATA={counts, rows};
  }
  function renderCurrent(){ const v=document.body.dataset.view; if(v==='archive')return renderArchive(); v==='attention'?renderAttention():renderProject(); }
  // 归档周视图:已完成/归档的工作按 ISO 周分组,每周一句话小结
  async function renderArchive(){
    mini.innerHTML='';
    board.innerHTML='<div style="padding:40px;text-align:center;color:var(--ink-faint)">加载归档…</div>';
    try{
      const j=await fetch(ORIGIN+'/api/archive-weeks').then(r=>r.json());
      const weeks=j.weeks||[];
      if(!weeks.length){ board.innerHTML='<div style="padding:48px;text-align:center;color:var(--ink-faint)">还没有完成 / 归档的工作</div>'; return; }
      board.innerHTML=weeks.map(w=>{
        const byWs={}; (w.items||[]).forEach(it=>{(byWs[it.ws]=byWs[it.ws]||[]).push(it);});
        const groups=Object.keys(byWs).map(ws=>`<div class="aw-proj"><span class="aw-ws">${esc(ws)}</span><div class="aw-items">`+byWs[ws].map(it=>`<span class="aw-item ${it.kind}" title="${esc((it.when||'').slice(0,10))}">${it.kind==='archived'?'📦':'✓'} ${esc(it.name)}</span>`).join('')+`</div></div>`).join('');
        const rep=w.has_report?`<span class="aw-rep" title="基于 DD-006 周报提炼">周报</span>`:'';
        const hl=(w.highlights&&w.highlights.length)?`<ul class="aw-hl">`+w.highlights.map(h=>`<li>${esc(h)}</li>`).join('')+`</ul>`:'';
        return `<section class="aw-week"><div class="aw-head"><span class="aw-label">${esc(w.label)}</span><span class="aw-wk">${esc(w.week)}</span>${rep}<span class="aw-cnt">${w.count} 项</span></div><div class="aw-summary">${esc(w.summary)}</div>${hl}${groups}</section>`;
      }).join('');
    }catch(_){ board.innerHTML='<div style="padding:48px;text-align:center;color:var(--ink-faint)">加载失败</div>'; }
  }
  // Signature of what's actually rendered (excludes the volatile idle timer),
  // so the 8s poll / SSE only re-render when something really changed — and
  // your expanded cards don't collapse under you.
  function dataSig(){ return JSON.stringify((DATA.rows||[]).map(r=>[r.id,r.band,r.name,r.reason,r.tasks_pending,(r.artifacts||[]).length,r.progress,r.fresh,r.next_step,r.awaiting_user]))+JSON.stringify(DATA.counts||{})+(SYNC.state||'')+(SYNC.reason||'')+CLAUDE_OK; }
  function refreshUI(force){ const s=dataSig(); if(!force && s===lastSig) return; lastSig=s; rebuildHud(); renderCurrent();
    // keep the open terminal's resource panel fresh as the pipeline collects more
    const tm=document.getElementById('termModal'); if(tm&&tm.style.display!=='none'&&tm.dataset.sid&&typeof renderTermRes==='function') renderTermRes(tm.dataset.sid); }
  async function loadData(){ try{
    const [d,l]=await Promise.all([
      fetch(ORIGIN+'/api/data').then(r=>r.json()),
      fetch(ORIGIN+'/api/live').then(r=>r.json()).catch(()=>({live:{}})) ]);
    MINDMAP=(d&&d.mindmap)||{workspaces:[]}; LIVE=(l&&l.live)||{};
    LOCATIONS=(d&&d.locations&&d.locations.by_session_id)||{};
    SYNC=(d&&d.sync)||{}; CLAUDE_OK=!(d&&d.claude_ok===false);
    buildRows(); refreshUI();
  }catch(e){} }
  let _es=null;
  function startLive(){
    try{ if(_es)_es.close(); }catch(_){}
    try{ const es=new EventSource(ORIGIN+'/api/events'); _es=es;
      es.onmessage=e=>{ try{ LIVE=JSON.parse(e.data)||{}; buildRows(); refreshUI(); }catch(_){}};
      es.onerror=()=>{ try{es.close()}catch(_){}; _es=null; setTimeout(startLive,3000); };
    }catch(_){ setTimeout(startLive,3000); }
  }
  // When the cockpit tab regains focus (you came back from the terminal/ghostty),
  // browsers throttle the background poll and may queue SSE — so live status can
  // look stale. Force an immediate refresh + SSE reconnect the instant you return.
  document.addEventListener('visibilitychange',()=>{ if(!document.hidden){ loadData(); if(!_es) startLive(); }});
  const esc = s => String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
  const BANDS=[{key:'needs_you',glyph:'⚠',label:'等你',collapse:false},{key:'done_unread',glyph:'✅',label:'完成 · 待查看',collapse:false},{key:'running',glyph:'◐',label:'AI 在跑',collapse:false},
    {key:'idle',glyph:'○',label:'闲置',collapse:false},{key:'done',glyph:'✓',label:'今天完成',collapse:true},{key:'paused',glyph:'⏸',label:'搁置',collapse:true}];
  const RANK={needs_you:0,done_unread:1,running:2,idle:3,done:4,paused:5};
  const LV={thread:'主线',card:'卡',chip:'片'};
  // 主线 = 持续的工作主干;支线 = 个人/兴趣/临时(AI 可建议、用户可改)
  const MAIN_WS=['hsf-workspace','hsfops','mw-cli','hsf-doc-generator'];
  const tierOf = ws => MAIN_WS.includes(ws)?'main':'side';
  const board=document.getElementById('board'), mini=document.getElementById('minimap');

  // animated status icon (转圈=在跑 / 脉冲=等你 / 空心=闲置 / ✓=完成 / ⏸=搁置)
  function statusIcon(b,s){s=s||12;
    if(b==='running')return `<span class="sic" style="width:${s}px;height:${s}px"><svg class="spin" viewBox="0 0 24 24" width="${s}" height="${s}"><circle cx="12" cy="12" r="9" fill="none" stroke="var(--run)" stroke-width="3" stroke-linecap="round" stroke-dasharray="40 18"/></svg></span>`;
    if(b==='needs_you')return `<span class="sic ndot" style="width:${s}px;height:${s}px"><span class="ping"></span><span class="core"></span></span>`;
    if(b==='idle')return `<span class="sic idot" style="width:${s}px;height:${s}px"></span>`;
    if(b==='done')return `<span class="sic" style="width:${s}px;height:${s}px"><svg viewBox="0 0 24 24" width="${s}" height="${s}"><path d="M5 13l4 4L19 7" fill="none" stroke="var(--done)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg></span>`;
    if(b==='paused')return `<span class="sic" style="width:${s}px;height:${s}px"><svg viewBox="0 0 24 24" width="${s}" height="${s}"><rect x="7" y="6" width="3.6" height="12" rx="1.6" fill="var(--paused)"/><rect x="13.4" y="6" width="3.6" height="12" rx="1.6" fill="var(--paused)"/></svg></span>`;
    if(b==='done_unread')return `<span class="sic dchk" style="width:${s}px;height:${s}px"><svg viewBox="0 0 24 24" width="${s}" height="${s}"><path d="M5 13l4 4L19 7" fill="none" stroke="var(--done)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg></span>`;
    return '';}

  // HUD
  let active=0;
  function rebuildHud(){
  const c=DATA.counts||{}; active=(c.needs_you||0)+(c.done_unread||0)+(c.running||0)+(c.idle||0);
  document.getElementById('hud').innerHTML=
    `<div class="stat"><span class="n">${active}</span><span class="lbl">进行中</span></div><span class="sep">·</span>`+
    `<div class="stat k-needs"><span class="n">${c.needs_you||0}</span><span class="lbl">等你</span></div>`+
    `<div class="stat k-dun"><span class="n">${c.done_unread||0}</span><span class="lbl">待查看</span></div>`+
    `<div class="stat k-run"><span class="n">${c.running||0}</span><span class="lbl">AI在跑</span></div>`+
    `<div class="stat k-idle"><span class="n">${c.idle||0}</span><span class="lbl">闲置</span></div>`;
  const _cl=document.getElementById('clock'); if(_cl)_cl.textContent='实时 · '+new Date().toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'});
  const _dc=document.getElementById('disc'); if(_dc)_dc.innerHTML=`<b>实时</b>:状态由 Claude Code hooks 驱动(running/idle/needs-you)。「主线/支线」「优先级」为示例,可拖拽。`;
  }

  // shared pieces
  function chip(a){const t=(a.type||'').toLowerCase(),cls=t==='mr'?'mr':(t==='cr'?'cr':'cd');
    const inner=`<span class="k">${esc(t.toUpperCase()||'REF')}</span><span>!${esc(a.ref_id||'')}</span>`,tip=esc(a.title||'');
    const u=httpUrl(a);return u?`<a class="chip ${cls} link" href="${esc(u)}" target="_blank" title="${tip}" onclick="event.stopPropagation()">${inner}</a>`:`<span class="chip ${cls}" title="${tip}">${inner}</span>`;}
  // DD-021: artifacts split into two visually-distinct groups (the principle):
  //   ① external resources — follow-up endpoints you open in a browser
  //   ② code location      — branch/tag/worktree, where the work lives
  // commit + local file paths are dropped at the source (summarize Rule 10), so
  // anything outside both sets is residual legacy noise → collapsed to a count.
  const RES_EXTERNAL=new Set(['mr','pr','cr','issue','deployment','doc','other']);
  const RES_CODELOC=new Set(['branch','tag','worktree']);
  // only an http(s) url is a real, openable external link. A local file path in
  // `url` (legacy data) is NOT — never render it as a link (it 404s on serve).
  const httpUrl=a=>{const u=(a&&a.url||'').trim();return /^https?:\/\//i.test(u)?u:'';};
  // dedupe: same artifact can arrive with its name in ref_id on one entry and
  // title on another → different keys upstream. Collapse by http-url, else by
  // type+name (ref_id||title), so identical branches/docs don't double up.
  const artKey=a=>{const u=httpUrl(a);if(u)return 'u:'+u;
    const t=(a.type||'').toLowerCase(),n=((a.ref_id||a.title||'')+'').trim().toLowerCase();return t+':'+n;};
  const dedupe=arts=>{const seen=new Set();return (arts||[]).filter(a=>{const k=artKey(a);if(seen.has(k))return false;seen.add(k);return true;});};
  // a `doc` is external only if it has an http url (DD-021: local doc paths are
  // not resources). Drop local-path docs so they don't show as dead links.
  const isExternal=a=>{const t=(a.type||'').toLowerCase();if(!RES_EXTERNAL.has(t))return false;
    if(t==='doc'&&!httpUrl(a))return false;return true;};
  const extArts=arts=>dedupe((arts||[]).filter(isExternal));
  const locArts=arts=>dedupe((arts||[]).filter(a=>RES_CODELOC.has((a.type||'').toLowerCase())));
  const noiseCount=arts=>(arts||[]).length-(arts||[]).filter(isExternal).length-(arts||[]).filter(a=>RES_CODELOC.has((a.type||'').toLowerCase())).length;
  const chipsRow=arts=>{const s=extArts(arts);return !s.length?'':s.slice(0,3).map(chip).join('')+(s.length>3?`<span class="chip more">+${s.length-3}</span>`:'');};
  // code-location item: name/path is local (no URL) → click to copy so you can
  // cd / git checkout it. data-copy carries the raw value (esc-safe in attr).
  function locItem(a){const t=(a.type||'ref').toLowerCase(),v=a.ref_id||a.title||'';
    const icon=t==='worktree'?'📁':(t==='tag'?'🏷':'⎇');
    return `<button class="loc-item" data-copy="${esc(v)}" title="点击复制:${esc(v)}" onclick="event.stopPropagation();copyText(this.dataset.copy).then(()=>toast('已复制 '+this.dataset.copy))"><span class="loc-k">${icon} ${esc(t)}</span><span class="loc-v">${esc(v)}</span></button>`;}
  // 取 progress 首句,让搁置/空闲的卡在列表行也能瞥见最新进展(完整文本进 tooltip)
  function firstSent(s){s=(s||'').replace(/\s+/g,' ').trim();if(!s)return '';const i=s.search(/[。!?；]/);const out=i>0?s.slice(0,i+1):s;return out.length>80?out.slice(0,80)+'…':out;}
  function progMid(cls,r,fallback){const p=r.progress?firstSent(r.progress):'';const tip=r.progress?` title="${esc(r.progress)}"`:'';
    return `<div class="mid ${cls}"${tip}><span class="rtext">${p?esc(p):fallback}</span></div>`;}
  function midCell(r){
    if(r.band==='needs_you')return `<div class="mid needs_you"><span class="rtext">${esc(r.reason||'等你确认下一步')}</span></div>`;
    if(r.band==='running'){const p=r.pct||0;return `<div class="mid running"><span class="bar"><i style="width:${p}%"></i></span><span class="pct">${p}%</span><span class="rtext">${esc(r.activity||'进行中')}</span></div>`;}
    if(r.band==='done_unread')return progMid('dunread', r, esc(r.reason||'AI 已完成,待你查看'));
    if(r.band==='idle')return progMid('idle', r, esc(r.idle)+' 未动');
    if(r.band==='done')return progMid('idle', r, '已完成 · '+esc(r.idle)+'前');
    if(r.band==='paused')return progMid('idle', r, '搁置 · '+esc(r.idle)+'未动');
    return `<div class="mid"></div>`;}
  // 把 progress 自由叙述切成「进展节点」,让关键动作各自成行可扫读(轻量补 task 粒度)
  function progSteps(t){
    const parts=((t||'').match(/[^。!?；]+[。!?；]?/g)||[]).map(s=>s.trim()).filter(s=>s.length>=6);
    if(parts.length<=1)return `<div class="progress">${esc(t||'')}</div>`;
    return `<div class="sectit">进展</div><ul class="prog-steps">`+parts.map(p=>`<li>${esc(p)}</li>`).join('')+`</ul>`;}
  function detail(r){let h='';
    if(r.summary)h+=`<div class="summary">${esc(r.summary)}</div>`;
    if(r.fresh)h+=`<div class="fresh-tag" title="本轮会话总结的最新状态,AI 跨会话归并仍在进行">● 实时 · 本轮进展</div>`;
    if(r.progress)h+=progSteps(r.progress);
    if(r.awaiting_user)h+=`<div class="await-line" title="这件事卡在你这里">⏳ 等你:${esc(r.awaiting_user)}</div>`;
    if(r.next_step)h+=`<div class="next-line" title="AI 判断的下一步动作">▸ 下一步:${esc(r.next_step)}</div>`;
    if(r.blockers&&r.blockers.length)h+=`<div class="sectit">卡点 / 等待</div><ul>`+r.blockers.map(b=>`<li class="blk"><span class="b">▍</span><span>${esc(b)}</span></li>`).join('')+`</ul>`;
    if(r.tasks_total)h+=`<div class="sectit">任务 · 共 ${r.tasks_total} · 待办 ${r.tasks_pending}</div>`;
    if(r.artifacts&&r.artifacts.length){const ea=extArts(r.artifacts),la=locArts(r.artifacts),nc=noiseCount(r.artifacts);
      if(ea.length)h+=`<div class="sectit">外部资源</div><div class="chips-full">`+ea.map(a=>`<span style="display:flex;gap:6px;align-items:center">${chip(a)}${a.title?`<span style="font-size:11.5px;color:var(--ink-faint)">${esc(a.title)}</span>`:''}</span>`).join('')+`</div>`;
      if(la.length)h+=`<div class="sectit">代码位置</div><div class="loc-row">`+la.map(locItem).join('')+`</div>`;
      if(nc>0)h+=`<div class="res-noise">+ ${nc} 个已折叠(commit 等噪声,下次同步自动清除)</div>`;}
    if(r.sealed)h+=`<div class="sealed-note">📑 会话内沉淀 · 这段已完成的工作来自同一会话(<code>${esc((r.origin_session||'').slice(0,8))}</code>)的早期阶段,已封存为独立记录。</div>`;
    h+=`<div class="meta"><span>${r.sealed?'源自会话 '+esc((r.origin_session||'').slice(0,8)):'会话 '+(r.n_sessions||0)+' 个'}</span><span>层级 ${LV[r.level]||r.level||''}</span><span>工作区 ${esc(r.ws)}</span></div>`;
    const sid0=esc(r.session||'');
    // DD-019: sealed cards have no live session — "进入会话" resumes the
    // origin session; the merge action is meaningless (empty sessions[]).
    const mergeBtn=r.sealed?'':`<button class="btn" onclick="mergeStart(event,'${esc(r.id||'')}')">合并到…</button>`;
    h+=`<div class="acts"><button class="btn primary" onclick="openTerminal(event,'${sid0}')">终端 ▸</button><button class="btn" onclick="suggestReplies(event,'${sid0}')" title="AI 建议接下来发给这条会话的下一句(全局视角,多选)">建议下一句 ▸</button><button class="btn" onclick="enterSession(event,'${sid0}')">${r.sealed?'回到源会话':'跳转 pane'}</button><button class="btn" onclick="viewHistory(event,'${sid0}')">查看对话</button>${mergeBtn}<span class="acts-sp"></span><button class="btn" onclick="archiveInit(event,'${esc(r.id||'')}','${esc(r.name||'')}')">归档</button><button class="btn danger" onclick="deleteInit(event,'${esc(r.id||'')}','${esc(r.name||'')}')">删除</button></div>`;
    return `<div class="detail">${h}</div>`;}
  function rowEl(r){const lv=LV[r.level]?`<span class="lv">${LV[r.level]}</span>`:'';
    const seal=r.sealed?`<span class="lv sealed">沉淀</span>`:'';
    return `<div class="row${r.sealed?' is-sealed':''}" data-band="${r.band}" data-id="${esc(r.id||'')}">${statusIcon(r.band,12)}`+
      `<div class="name"><div class="t">${esc(r.name)}</div><div class="ws">${esc(r.ws)} ${lv}${seal}</div></div>`+
      midCell(r)+`<div class="chips">${chipsRow(r.artifacts)}</div><div class="timer">${esc(r.idle)}</div><div class="go">→</div></div>`+detail(r);}
  function collapsedBand(key){const b=BANDS.find(x=>x.key===key),rows=DATA.rows.filter(r=>r.band===key);
    if(!rows.length)return '';
    return `<section class="band collapsed" data-band="${key}"><div class="band-head clickable"><span class="glyph">${b.glyph}</span><span class="htxt">${b.label}</span><span class="cnt">${rows.length}</span><span class="rule"></span><span class="chev">▾</span></div><div class="rows">`+rows.map(rowEl).join('')+`</div></section>`;}

  // order persistence (draggable priority)
  const loadOrder=t=>{try{return JSON.parse(localStorage.getItem('cockpit-order-'+t)||'null')}catch(e){return null}};
  const saveOrder=zone=>{try{localStorage.setItem('cockpit-order-'+zone.dataset.tier,JSON.stringify([...zone.querySelectorAll('.proj')].map(p=>p.dataset.ws)))}catch(e){}};

  // Empty / first-run / sync-health panel — shown when there are no cards yet,
  // so a fresh user (or a colleague) sees WHY (syncing / failed / claude missing)
  // instead of a silent blank board.
  function emptyStateHTML(){
    if(!CLAUDE_OK) return `<div class="empty-state err"><div class="es-t">⚠ 未找到 claude CLI</div><div class="es-b">后台分析无法进行。确认已安装 Claude Code、<code>claude</code> 在 PATH 且已登录(试 <code>claude -p hi</code>),然后刷新。</div></div>`;
    const st=SYNC.state||'';
    if(st==='running') return `<div class="empty-state"><div class="es-spin"></div><div class="es-t">首次同步中…</div><div class="es-b">${esc(SYNC.reason||'正在分析你最近的会话(首次约 1–2 分钟,会用一点 Haiku)。')}</div></div>`;
    if(st==='failed') return `<div class="empty-state err"><div class="es-t">⚠ 后台同步出问题了</div><div class="es-b">${esc(SYNC.reason||'同步失败。')}</div>`+(SYNC.log_tail?`<pre class="es-log">${esc(SYNC.log_tail)}</pre>`:'')+`<div class="es-b">修好后刷新页面,或在终端跑 <code>stray --refresh</code>。</div></div>`;
    return `<div class="empty-state"><div class="es-t">还没有卡片</div><div class="es-b">近 48 小时没有 Claude Code 会话?要把全部历史拉进来,终端跑 <code>stray --backfill</code>。</div></div>`;
  }
  // ATTENTION view
  function renderAttention(){mini.innerHTML='';let html='';
    if(!DATA.rows.length){board.innerHTML=emptyStateHTML();return;}
    BANDS.forEach(b=>{const rows=DATA.rows.filter(r=>r.band===b.key).sort((x,y)=>y.idle_secs-x.idle_secs);
      if(!rows.length)return; if(b.collapse){html+=collapsedBand(b.key);return;}
      html+=`<section class="band" data-band="${b.key}"><div class="band-head"><span class="glyph">${b.glyph}</span><span class="htxt">${b.label}</span><span class="cnt">${rows.length}</span><span class="rule"></span></div><div class="rows">`+rows.map(rowEl).join('')+`</div></section>`;});
    board.innerHTML=html;wire();}

  // PROJECT view (tiers + minimap + draggable + item strips)
  function projectAgg(){
    const act=DATA.rows.filter(r=>['needs_you','done_unread','running','idle'].includes(r.band));
    const byWs={};act.forEach(r=>(byWs[r.ws]=byWs[r.ws]||[]).push(r));
    return Object.keys(byWs).map(ws=>{const rows=byWs[ws].sort((a,b)=>RANK[a.band]-RANK[b.band]||b.idle_secs-a.idle_secs);
      const n=k=>rows.filter(r=>r.band===k).length;
      const urg=rows.some(r=>r.band==='needs_you'||r.band==='done_unread')?2:(rows.some(r=>r.band==='running')?1:0);
      return {ws,rows,tier:tierOf(ws),needs:n('needs_you'),dun:n('done_unread'),run:n('running'),idleN:n('idle'),urg,recency:Math.min.apply(null,rows.map(r=>r.idle_secs))};});
  }
  function sortProjs(arr,tier){const ord=loadOrder(tier);
    if(ord)return arr.slice().sort((a,b)=>{const ia=ord.indexOf(a.ws),ib=ord.indexOf(b.ws);return (ia<0?999:ia)-(ib<0?999:ib)||b.urg-a.urg;});
    return arr.slice().sort((a,b)=>b.urg-a.urg||a.recency-b.recency);}
  function streamLine(p,open){
    const counts=`${p.rows.length} 件`+(p.needs?` · <span class="amb">${p.needs} 等你</span>`:'')+(p.dun?` · <span class="gdone">${p.dun} 待查看</span>`:'')+(p.run?` · <span class="run">${p.run} 跑</span>`:'')+(p.idleN?` · <span class="dim">${p.idleN} 闲</span>`:'');
    const pcls=p.urg===2?'needs_you':(p.urg===1?'running':'idle');
    const strip=p.rows.slice(0,6).map(r=>`<span class="it" title="${esc(r.name)}">${statusIcon(r.band,10)}${esc(r.name)}</span>`).join('')+(p.rows.length>6?`<span class="it more">+${p.rows.length-6}</span>`:'');
    return `<section class="proj${open?'':' collapsed'}" data-ws="${esc(p.ws)}" draggable="true">`+
      `<div class="proj-head" data-urg="${p.urg}"><span class="dragh" title="拖拽调整优先级">⠿</span><span class="chev">▸</span>`+
      `${statusIcon(pcls,15)}<span class="pname">${esc(p.ws)}</span><span class="pcounts">${counts}</span>`+
      `<span class="pstrip">${strip}</span><span class="ptimer">${esc(p.rows[0].idle)}</span></div>`+
      `<div class="rows">`+p.rows.map(rowEl).join('')+`</div></section>`;}
  function renderProject(){
    if(!DATA.rows.length){mini.innerHTML='';board.innerHTML=emptyStateHTML();return;}
    const projs=projectAgg();
    const main=sortProjs(projs.filter(p=>p.tier==='main'),'main');
    const side=sortProjs(projs.filter(p=>p.tier==='side'),'side');
    // mindmap nav (全部 → 项目 → 任务)
    const branch=p=>{const pcls=p.urg===2?'needs_you':(p.urg===1?'running':'idle');
      const leaves=p.rows.slice(0,8).map(r=>`<span class="mleaf" data-ws="${esc(p.ws)}" title="${esc(r.name)}">${statusIcon(r.band,10)}${esc(r.name)}</span>`).join('');
      return `<div class="mbranch"><div class="mnode" data-ws="${esc(p.ws)}" data-urg="${p.urg}">${statusIcon(pcls,13)}<span class="mname">${esc(p.ws)}</span><span class="mc">${p.rows.length}</span></div><div class="mleaves">${leaves}</div></div>`;};
    mini.className='minimap';
    mini.innerHTML=`<div class="mind-head">脑图总览 · 项目 → 任务 <span class="mh-chev">▾</span></div>`+
      `<div class="mind"><svg class="mind-links"></svg>`+
      `<div class="mind-root"><span>全部</span><b>${active}</b></div>`+
      `<div class="mind-branches">`+main.concat(side).map(branch).join('')+`</div></div>`;
    // board
    let html='';
    const zone=(tier,label,arr)=>{
      if(!arr.length)return '';
      let topOpen = tier==='main'; // expand top of 主线 only
      return `<div class="tier-head ${tier==='side'?'side':''}"><span class="tx">${label}</span></div>`+
        `<div class="zone" data-tier="${tier}">`+arr.map((p,i)=>streamLine(p, topOpen&&i===0)).join('')+`</div>`;
    };
    html+=zone('main','主线',main);
    html+=zone('side','支线 · 个人 / 兴趣',side);
    html+=collapsedBand('done')+collapsedBand('paused');
    board.innerHTML=html;wire();bindDnD();requestAnimationFrame(drawMindLinks);}

  // wiring
  function wire(){
    board.querySelectorAll('.band-head.clickable').forEach(h=>h.addEventListener('click',()=>h.closest('.band').classList.toggle('collapsed')));
    board.querySelectorAll('.proj-head').forEach(h=>h.addEventListener('click',e=>{if(e.target.closest('.dragh'))return;const sec=h.closest('.proj');sec.classList.toggle('collapsed');PCOLLAPSE[sec.dataset.ws]=sec.classList.contains('collapsed')?'c':'o';}));
    board.querySelectorAll('.row').forEach(row=>row.addEventListener('click',e=>{if(e.target.closest('a'))return;if(e.target.closest('.go')){enter(e);return;}const id=row.getAttribute('data-id');const willOpen=!row.classList.contains('open');row.classList.toggle('open');if(id){willOpen?OPEN.add(id):OPEN.delete(id);}}));
    mini.querySelectorAll('.mnode,.mleaf').forEach(n=>n.addEventListener('click',()=>jumpTo(n.dataset.ws)));
    const mh=mini.querySelector('.mind-head');
    if(mh)mh.addEventListener('click',()=>{mini.classList.toggle('mclosed');if(!mini.classList.contains('mclosed'))requestAnimationFrame(drawMindLinks);});
    if(location.hash.indexOf('open')>=0){const m=location.hash.match(/open=?(\d+)?/),rows=board.querySelectorAll('.row'),idx=m&&m[1]?parseInt(m[1]):0;if(rows[idx])rows[idx].classList.add('open');}
    // re-apply preserved UI state so a background refresh never collapses your view
    board.querySelectorAll('.proj').forEach(sec=>{const v=PCOLLAPSE[sec.dataset.ws];if(v==='o')sec.classList.remove('collapsed');else if(v==='c')sec.classList.add('collapsed');});
    board.querySelectorAll('.row[data-id]').forEach(row=>{if(OPEN.has(row.getAttribute('data-id')))row.classList.add('open');});
  }
  let dragEl=null;
  function bindDnD(){
    board.querySelectorAll('.proj').forEach(p=>{
      p.addEventListener('dragstart',()=>{dragEl=p;p.classList.add('dragging');});
      p.addEventListener('dragend',()=>{p.classList.remove('dragging');const z=p.closest('.zone');if(z)saveOrder(z);});
    });
    board.querySelectorAll('.zone').forEach(z=>{
      z.addEventListener('dragover',e=>{e.preventDefault();if(!dragEl||dragEl.closest('.zone')!==z)return;
        const after=dragAfter(z,e.clientY);if(after==null)z.appendChild(dragEl);else z.insertBefore(dragEl,after);});
    });
  }
  function dragAfter(zone,y){const els=[...zone.querySelectorAll('.proj:not(.dragging)')];
    return els.reduce((c,ch)=>{const b=ch.getBoundingClientRect(),o=y-b.top-b.height/2;return o<0&&o>c.offset?{offset:o,element:ch}:c;},{offset:-Infinity,element:null}).element;}
  function jumpTo(ws){const sec=board.querySelector('.proj[data-ws="'+(window.CSS&&CSS.escape?CSS.escape(ws):ws)+'"]');
    if(sec){sec.classList.remove('collapsed');sec.classList.add('flash');setTimeout(()=>sec.classList.remove('flash'),800);}}
  function drawMindLinks(){
    const mind=mini.querySelector('.mind');if(!mind||mini.classList.contains('mclosed'))return;
    const svg=mind.querySelector('.mind-links');if(!svg)return;
    const box=mind.getBoundingClientRect();
    svg.setAttribute('viewBox','0 0 '+box.width+' '+box.height);
    const pt=(el,side)=>{const r=el.getBoundingClientRect();return {x:(side==='r'?r.right:r.left)-box.left,y:r.top-box.top+r.height/2};};
    const curve=(a,b)=>{const mx=(a.x+b.x)/2;return 'M'+a.x.toFixed(1)+','+a.y.toFixed(1)+' C'+mx.toFixed(1)+','+a.y.toFixed(1)+' '+mx.toFixed(1)+','+b.y.toFixed(1)+' '+b.x.toFixed(1)+','+b.y.toFixed(1);};
    const root=mind.querySelector('.mind-root');const paths=[];
    if(root)mind.querySelectorAll('.mbranch').forEach(br=>{const mn=br.querySelector('.mnode');if(mn)paths.push({d:curve(pt(root,'r'),pt(mn,'l')),u:mn.dataset.urg});});
    svg.innerHTML=paths.map(p=>'<path d="'+p.d+'" fill="none" stroke="'+(p.u==='2'?'rgba(255,168,64,.35)':'var(--hair)')+'" stroke-width="1.5"/>').join('');
  }
  window.addEventListener('resize',()=>{if(document.body.dataset.view==='project')drawMindLinks();});
  function enter(e){ if(e&&e.stopPropagation)e.stopPropagation(); }  // legacy [→] in row: no-op (use detail buttons)
  // Enter the session: focus its zellij pane if we know it, else open a new pane (claude --resume).
  // DD-018 companion path: "enter" = jump to the session's zellij pane in YOUR
  // terminal (focus), or open it in a new pane. No browser terminal here.
  function enterSession(e,sid){ e.stopPropagation(); if(!sid){toast('该工作没有关联会话');return;}
    const loc=LOCATIONS[sid];
    if(loc&&loc.zellij_pane_id){
      fetch(ORIGIN+'/focus',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({pane:loc.zellij_pane_id,session:loc.zellij_session||''})})
        .then(r=>r.json()).then(j=>{ if(j.ok)toast('已跳到该会话窗格'); else if(j.error==='pane_gone'){toast('窗格已关闭,新开一个');openPane(sid);} else toast('聚焦失败:'+(j.error||'')); })
        .catch(()=>toast('聚焦失败'));
    } else { openPane(sid); }
  }
  function openPane(sid){
    const loc=LOCATIONS[sid]||{};
    fetch(ORIGIN+'/newpane',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({sid,cwd:loc.cwd||''})})
      .then(r=>r.json()).then(j=>toast(j.ok?'已在 zellij 新窗格打开 claude --resume':(j.error==='zellij not installed'?'未装 zellij':'打开失败:'+(j.error||''))))
      .catch(()=>toast('打开失败'));
  }
  async function archiveInit(e,id,name){ e.stopPropagation(); if(!id)return;
    if(!confirm('归档「'+name+'」?可在 cache/archive 找回。')) return;
    try{ const r=await fetch(ORIGIN+'/api/archive',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({id})}); if(!r.ok)throw 0; OPEN.delete(id); toast('已归档'); setTimeout(()=>loadData(),400);}catch(_){toast('归档失败');}
  }
  async function deleteInit(e,id,name){ e.stopPropagation(); if(!id)return;
    if(!confirm('删除「'+name+'」?会从看板移除(记录到 deleted_ids)。')) return;
    try{ const r=await fetch(ORIGIN+'/api/delete',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({id})}); if(!r.ok)throw 0; OPEN.delete(id); toast('已删除'); setTimeout(()=>loadData(),400);}catch(_){toast('删除失败');}
  }
  // DD-015 Stage 3a: read-only recent conversation
  // Live read-only conversation mirror: reads the session jsonl (which Claude
  // Code writes in real time), auto-refreshing — so you watch the session
  // progress as you work in Ghostty, with NO terminal resize.
  let _histTimer=null;
  async function loadHist(sid){
    const m=document.getElementById('histModal'); if(!m)return;
    try{
      const j=await fetch(ORIGIN+'/api/transcript?sid='+encodeURIComponent(sid)+'&n=16').then(r=>r.json());
      const turns=j.turns||[];
      const hb=m.querySelector('.histbody'); if(!hb)return;
      const atBottom = hb.scrollHeight-hb.scrollTop-hb.clientHeight < 80;
      hb.innerHTML = turns.length?turns.map(t=>`<div class="ht ${t.role}"><div class="ht-role">${t.role==='user'?'你':'Claude'}</div><div class="ht-text">${esc(t.text)}</div></div>`).join(''):'<div style="color:var(--ink-faint);padding:24px;text-align:center">没有可显示的对话</div>';
      const cnt=m.querySelector('.hist-cnt'); if(cnt)cnt.textContent=turns.length;
      if(atBottom) hb.scrollTop=hb.scrollHeight;
    }catch(_){}
  }
  function viewHistory(e,sid){ e.stopPropagation(); if(!sid){toast('该工作没有关联会话');return;}
    let m=document.getElementById('histModal');
    if(!m){m=document.createElement('div');m.id='histModal';m.className='histmask';document.body.appendChild(m);}
    m.innerHTML=`<div class="histbox"><div class="histhead"><span>会话对话 · 最近 <b class="hist-cnt">…</b> 轮 · <span style="color:var(--run)">● 实时</span></span><button class="btn" onclick="closeHist()">关闭</button></div><div class="histbody"><div style="color:var(--ink-faint);padding:24px;text-align:center">加载中…</div></div><div class="histfoot"><input id="histInput" class="histin" placeholder="发条消息到这个会话(注入到 zellij pane)…" onkeydown="if(event.key==='Enter'){event.preventDefault();sendMsg('${esc(sid)}')}"><button class="btn primary" onclick="sendMsg('${esc(sid)}')">发送</button></div></div>`;
    m.onclick=ev=>{if(ev.target===m)closeHist();};
    loadHist(sid);
    clearInterval(_histTimer); _histTimer=setInterval(()=>loadHist(sid), 4000);
  }
  function closeHist(){ clearInterval(_histTimer); _histTimer=null; const m=document.getElementById('histModal'); if(m)m.remove(); }
  // Send a message into the session's live zellij pane (drives the real claude)
  async function sendMsg(sid){
    const inp=document.getElementById('histInput'); if(!inp||!inp.value.trim())return;
    const text=inp.value; inp.disabled=true;
    try{
      const r=await fetch(ORIGIN+'/api/send',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({sid,text})});
      const j=await r.json();
      if(r.ok){ inp.value=''; toast('已发送到会话'); setTimeout(()=>loadHist(sid),1200); }
      else toast(j.hint||j.error||'发送失败');
    }catch(_){ toast('发送失败'); }
    inp.disabled=false; inp.focus();
  }
  // DD-018 §B: embedded ttyd terminal — resume the session IN the cockpit
  // (no new OS window). The single-driver gate lives server-side in
  // /api/terminal: it refuses to resume a session that's running elsewhere
  // (would fork the jsonl), and asks for confirm when one might be parked.
  // B (DD-020): AI 建议下一句 — 全局视角、多选;点一条即注入(/api/send)或复制。
  async function suggestReplies(e,sid){ if(e&&e.stopPropagation)e.stopPropagation();
    if(!sid){toast('该工作没有关联会话');return;}
    let m=document.getElementById('suggModal');
    if(!m){m=document.createElement('div');m.id='suggModal';m.className='histmask';document.body.appendChild(m);}
    m.dataset.sid=sid;
    m.innerHTML=`<div class="suggbox"><div class="sugghead"><span>AI 建议的下一句 · <code>${esc(sid.slice(0,8))}</code></span><button class="btn" onclick="closeSugg()">关闭</button></div><div class="suggbody"><div class="sugg-load">生成中…(全局视角,几秒)</div></div></div>`;
    m.onclick=ev=>{if(ev.target===m)closeSugg();};
    try{
      const r=await fetch(ORIGIN+'/api/suggest',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({sid})});
      const j=await r.json().catch(()=>({}));
      const body=m.querySelector('.suggbody'); if(!body||m.dataset.sid!==sid)return;
      if(r.ok&&(j.suggestions||[]).length){
        body.innerHTML=`<div class="sugg-hint">点一条 → 注入到这条会话(无活跃 pane 则复制)</div>`+
          j.suggestions.map(s=>`<button class="sugg-opt" onclick='sendSuggestion("${esc(sid)}",this.dataset.t)' data-t="${esc(s)}">${esc(s)}</button>`).join('');
      } else { body.innerHTML=`<div class="sugg-load">${esc((j&&(j.hint||j.error))||'没拿到建议')}</div>`; }
    }catch(_){ const body=m.querySelector('.suggbody'); if(body)body.innerHTML='<div class="sugg-load">请求失败</div>'; }
  }
  async function sendSuggestion(sid,text){
    try{
      const r=await fetch(ORIGIN+'/api/send',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({sid,text})});
      const j=await r.json().catch(()=>({}));
      if(r.ok){ toast('已发送到会话'); closeSugg(); return; }
      // no live pane → copy to clipboard so you can paste into the terminal
      await copyText(text); toast('无活跃 pane,已复制到剪贴板'); closeSugg();
    }catch(_){ await copyText(text); toast('已复制到剪贴板'); closeSugg(); }
  }
  async function copyText(t){ try{ await navigator.clipboard.writeText(t); }
    catch(_){ const ta=document.createElement('textarea');ta.value=t;ta.style.position='fixed';ta.style.opacity='0';document.body.appendChild(ta);ta.select();try{document.execCommand('copy')}catch(e){}ta.remove(); } }
  function closeSugg(){ const m=document.getElementById('suggModal'); if(m)m.remove(); }
  // Multiple INDEPENDENT terminals: one persistent <iframe> per session, kept
  // alive in a shared stack. Switching cards just toggles which iframe is
  // visible — siblings keep their WebSocket (so claude keeps running, never
  // re-resumes, never gets killed by opening another). ttyd kills its child the
  // moment the WS drops, so we must NEVER remove a sibling iframe on switch.
  function cssEsc(s){ return (window.CSS&&CSS.escape)?CSS.escape(String(s)):String(s); }
  function getTermModal(){
    let m=document.getElementById('termModal');
    if(!m){ m=document.createElement('div'); m.id='termModal'; m.className='termmask';
      m.innerHTML=`<div class="termbox"><div class="termhead"><span class="termtabs"></span><span class="tsp"></span><a class="btn ttnew" target="_blank" rel="noopener" title="若终端空白(ttyd 拒绝被内嵌),用此在新标签打开">↗ 新标签</a><button class="btn" onclick="hideTerm()" title="保留所有终端运行,随时点卡片「终端」秒回">关闭</button></div><div class="termbody"><div class="termstack"><div class="term-loading" hidden><div class="tl-spin"></div><div class="tl-txt"><b class="tl-msg">正在启动终端…</b><span class="tl-sub"></span></div></div></div></div></div><div class="termres" hidden></div>`;
      document.body.appendChild(m); m.onclick=ev=>{ if(ev.target===m) hideTerm(); }; }
    return m;
  }
  async function openTerminal(e,sid,force){ if(e&&e.stopPropagation)e.stopPropagation();
    if(!sid){toast('该工作没有关联会话');return;}
    const m=getTermModal();
    // already have a live terminal for this sid → just reveal it (instant,
    // same WS, scroll preserved, zero re-resume).
    if(m.querySelector(`.termstack iframe[data-sid="${cssEsc(sid)}"]`)){ m.style.display='flex'; setActiveTerm(sid); return; }
    m.style.display='flex'; showTermLoading('正在 resume 会话 · 启动终端…','首次打开要等 claude resume + tmux,几秒');
    try{
      const r=await fetch(ORIGIN+'/api/terminal',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({sid,force:!!force})});
      const j=await r.json().catch(()=>({}));
      if(r.ok&&j.url){ addTerm(sid,j.url); setActiveTerm(sid); return; }
      hideTermLoading();
      if(j.error==='maybe_live'&&j.need_force){ if(confirm(j.hint||'该会话可能还在别处开着,确定在驾驶舱新开一个副本?')) openTerminal(null,sid,true); return; }
      if(String(j.error||'').indexOf('ttyd')>=0){ toast('未装 ttyd:brew install ttyd'); return; }
      toast(j.hint||j.error||'打开终端失败');
    }catch(_){ hideTermLoading(); toast('打开终端失败'); }
  }
  function showTermLoading(msg,sub){ const m=document.getElementById('termModal'); if(!m)return;
    const o=m.querySelector('.term-loading'); if(!o)return;
    o.querySelector('.tl-msg').textContent=msg||'正在启动终端…'; o.querySelector('.tl-sub').textContent=sub||''; o.hidden=false; }
  function hideTermLoading(){ const o=document.getElementById('termModal')?.querySelector('.term-loading'); if(o)o.hidden=true; }
  function addTerm(sid,url){
    const stack=getTermModal().querySelector('.termstack');
    const f=document.createElement('iframe'); f.className='termframe'; f.dataset.sid=sid; f.src=url;
    f.setAttribute('allow','clipboard-read; clipboard-write');
    // ttyd's page loads fast, but tmux + claude --resume keep painting for a few
    // more seconds; keep the spinner a touch past load, with a hard cap.
    f.addEventListener('load',()=>setTimeout(hideTermLoading,1800));
    setTimeout(hideTermLoading,8000);
    stack.appendChild(f);
  }
  // DD-021②: the resources (MR/ISSUE/CR/doc) this session produced, shown
  // beside its terminal so you jump to the page in one click — no hunting.
  function findRowForSid(sid){ return (DATA.rows||[]).find(r=>r.session===sid||(r.sessions||[]).includes(sid)); }
  function renderTermRes(sid){
    const m=document.getElementById('termModal'); if(!m)return;
    const res=m.querySelector('.termres'); if(!res)return;
    const row=findRowForSid(sid); const ea=row?extArts(row.artifacts):[], la=row?locArts(row.artifacts):[];
    if(!ea.length&&!la.length){ res.hidden=true; res.innerHTML=''; return; }
    res.hidden=false;
    let html='';
    if(ea.length){html+=`<div class="tr-h">外部资源 · ${ea.length}</div>`+ea.map(a=>{
      const tl=(a.type||'ref').toLowerCase(), t=tl.toUpperCase();
      // semantic title is the headline; the raw id is a small secondary line so
      // a bare "CR 27369464" never stands alone as the label (DD-021).
      const hasTitle=!!(a.title&&a.title.trim());
      const head=esc(hasTitle?a.title:(a.ref_id||t));
      const sub=hasTitle&&a.ref_id?`<span class="tr-sub">${esc(t)} ${esc(a.ref_id)}</span>`:'';
      const badge=`<span class="tr-k k-${esc(tl)}">${esc(t)}</span>`;
      const u=httpUrl(a);
      return u
        ? `<a class="tr-item" href="${esc(u)}" target="_blank" rel="noopener" title="${esc(a.title||u)}">${badge}<span class="tr-l">${head}</span>${sub}</a>`
        : `<div class="tr-item nolink" title="未捕获完整 URL(装全局提示词后会带 URL)">${badge}<span class="tr-l">${head}</span>${sub}</div>`;
    }).join('');}
    if(la.length){html+=`<div class="tr-h tr-h2">代码位置 · ${la.length}</div>`+la.map(locItem).join('');}
    res.innerHTML=html;
  }
  function setActiveTerm(sid){
    const m=getTermModal(); m.dataset.sid=sid;
    const frames=[...m.querySelectorAll('.termstack iframe')];
    frames.forEach(f=>{ f.style.display=(f.dataset.sid===sid)?'block':'none'; });
    renderTermRes(sid);
    m.querySelector('.termtabs').innerHTML=frames.map(f=>{ const s=f.dataset.sid;
      return `<span class="ttab${s===sid?' on':''}" onclick="setActiveTerm('${esc(s)}')" title="${esc(s)}">${esc(s.slice(0,8))}<b onclick="endTermOne(event,'${esc(s)}')" title="结束此终端进程">×</b></span>`;
    }).join('');
    const act=m.querySelector(`.termstack iframe[data-sid="${cssEsc(sid)}"]`), nt=m.querySelector('.ttnew');
    if(nt&&act) nt.href=act.src;
  }
  // 关闭:只隐藏面板,所有 iframe + WebSocket 保持连接 → 各自的 claude 继续跑,秒回。
  function hideTerm(){ const m=document.getElementById('termModal'); if(m)m.style.display='none'; }
  // 结束某个终端:断开(ttyd 随之 SIGHUP 杀 claude)+ 关 ttyd;只影响这一个,其余不动。
  function endTermOne(e,sid){ if(e)e.stopPropagation();
    if(sid) fetch(ORIGIN+'/api/terminal-close',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({sid})}).catch(()=>{});
    const m=document.getElementById('termModal'); if(!m)return;
    const f=m.querySelector(`.termstack iframe[data-sid="${cssEsc(sid)}"]`); if(f)f.remove();
    const rest=[...m.querySelectorAll('.termstack iframe')];
    if(!rest.length){ m.remove(); return; }
    setActiveTerm((m.dataset.sid===sid)?rest[0].dataset.sid:m.dataset.sid);
  }
  // DD-016: merge this card into another (durable; survives re-classify)
  function mergeStart(e,id){
    e.stopPropagation();
    const self=DATA.rows.find(r=>r.id===id); if(!self) return;
    const others=DATA.rows.filter(r=>r.id&&r.id!==id);
    if(!others.length){ toast('没有可合并的目标'); return; }
    const host=e.target.closest('.acts'); if(!host) return;
    const opts=others.map(r=>`<option value="${esc(r.id)}">${esc(r.ws)} · ${esc(r.name)}</option>`).join('');
    host.innerHTML=`<span style="font-size:12.5px;color:var(--ink-dim)">把「${esc(self.name)}」合并到:</span>`+
      `<select id="mergeSel" style="font-size:12px;background:var(--bg-row);color:var(--ink);border:1px solid var(--hair);border-radius:6px;padding:6px 8px;max-width:280px">${opts}</select>`+
      `<button class="btn primary" onclick="mergeConfirm(event,'${esc(id)}')">确认合并</button>`+
      `<button class="btn" onclick="renderCurrent()">取消</button>`;
  }
  async function mergeConfirm(e,id){
    e.stopPropagation();
    const sel=document.getElementById('mergeSel'); if(!sel) return;
    const self=DATA.rows.find(r=>r.id===id), target=DATA.rows.find(r=>r.id===sel.value);
    if(!self||!target) return;
    const sessions=[...new Set([...(self.sessions||[]),...(target.sessions||[])])];
    try{
      const r=await fetch(ORIGIN+'/api/merge',{method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({sessions, canonical_id:target.id, name:target.name})});
      if(!r.ok) throw 0;
      toast('已合并到「'+target.name+'」');
      setTimeout(loadData, 500);
    }catch(_){ toast('合并失败'); }
  }
  let tt;function toast(m){const el=document.getElementById('toast');el.textContent=m;el.classList.add('show');clearTimeout(tt);tt=setTimeout(()=>el.classList.remove('show'),1800);}

  function setView(v){document.body.dataset.view=v;try{localStorage.setItem('cockpit-view',v)}catch(e){}
    document.querySelectorAll('#viewtog button').forEach(b=>b.classList.toggle('on',b.dataset.v===v));
    renderCurrent();}
  document.querySelectorAll('#viewtog button').forEach(b=>b.addEventListener('click',()=>setView(b.dataset.v)));
  let initView='project';try{initView=localStorage.getItem('cockpit-view')||'project'}catch(e){}
  if(location.hash.indexOf('attention')>=0)initView='attention';
  if(location.hash.indexOf('archive')>=0)initView='archive';
  setView(initView);

  // theme (昼/夜)
  function setTheme(t){document.documentElement.dataset.theme=t;try{localStorage.setItem('cockpit-theme',t)}catch(e){}
    const b=document.getElementById('themetog');if(b)b.textContent=t==='light'?'☀':'☾';
    if(document.body.dataset.view==='project')requestAnimationFrame(drawMindLinks);}
  (function(){const b=document.getElementById('themetog');if(b)b.addEventListener('click',()=>setTheme(document.documentElement.dataset.theme==='light'?'dark':'light'));
    let it='dark';try{it=localStorage.getItem('cockpit-theme')||'dark'}catch(e){}
    if(location.hash.indexOf('light')>=0)it='light'; setTheme(it);})();
  loadData(); setInterval(loadData, 3000); startLive();
  // ⟳ manual refresh — kicks the AI pipeline (summarize dirty sessions + classify);
  // spins until the data actually changes (or a 2min fallback).
  (function(){
    const b=document.getElementById('refreshBtn'); if(!b)return;
    b.addEventListener('click', async ()=>{
      if(b.classList.contains('spinning'))return;
      b.classList.add('spinning');
      try{
        const r=await fetch(ORIGIN+'/api/refresh',{method:'POST',headers:{'Content-Type':'application/json'},body:'{}'});
        toast((r.ok||r.status===202)?'正在后台重新分析最近会话…完成后自动更新':'刷新失败');
      }catch(_){ toast('刷新失败(服务未启动?)'); }
      const start=lastSig; let waited=0;
      const iv=setInterval(()=>{ waited+=2500; if(lastSig!==start||waited>120000){clearInterval(iv);b.classList.remove('spinning');} },2500);
    });
  })();
  if(location.hash.indexOf('hist=')>=0){ const s=decodeURIComponent(location.hash.split('hist=')[1]); setTimeout(()=>viewHistory({stopPropagation(){}}, s), 900); }
  </script>
</body>
