<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>claude-stray · 注意力驾驶舱 (DD-015 原型)</title>
<style>
  :root{
    --bg:#141417; --bg-elev:#1b1b21; --bg-row:#191920; --bg-row-hover:#20212a;
    --hair:#2a2a32; --hair-soft:#232329;
    --ink:#eae8e2; --ink-dim:#9a9aa6; --ink-faint:#62626c;
    --needs:#ffb454; --needs-edge:#ff9f43; --needs-bg:rgba(255,168,64,.065);
    --run:#56d3b6; --run-bg:rgba(86,211,182,.05);
    --idle:#7c7c88; --done:#74b07f; --paused:#6b6b76;
    --mr:#6fb4e8; --cr:#bd92e6; --cd:#e0a36b;
    --proj-open:rgba(255,255,255,.028); --connector:#34343e;
    --topbar-bg:rgba(20,20,23,.92); --disc-bg:rgba(20,20,23,.85);
    --needs-glow:rgba(255,168,64,.5); --run-glow:rgba(86,211,182,.6);
    --mono:ui-monospace,"SF Mono","JetBrains Mono",Menlo,Consolas,monospace;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;
  }
  html[data-theme="light"]{
    --bg:#f5f3ee; --bg-elev:#ffffff; --bg-row:#ffffff; --bg-row-hover:#efece4;
    --hair:#d7d2c6; --hair-soft:#e4e0d6;
    --ink:#191b21; --ink-dim:#474c57; --ink-faint:#7a7b85;
    --needs:#a8650f; --needs-edge:#bd7518; --needs-bg:rgba(168,101,15,.10);
    --run:#147a68; --run-bg:rgba(20,122,104,.10);
    --idle:#73747e; --done:#2f8245; --paused:#86868f;
    --mr:#235f9f; --cr:#6a44a0; --cd:#94600f;
    --proj-open:#efece3; --connector:#cbc5b7;
    --topbar-bg:rgba(245,243,238,.92); --disc-bg:rgba(245,243,238,.92);
    --needs-glow:rgba(168,101,15,.28); --run-glow:rgba(20,122,104,.3);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:var(--bg);color:var(--ink);font-family:var(--sans);-webkit-font-smoothing:antialiased;font-size:14px;line-height:1.45}
  a{color:inherit;text-decoration:none}

  /* topbar */
  .topbar{position:sticky;top:0;z-index:20;background:var(--topbar-bg);backdrop-filter:blur(8px);
    border-bottom:1px solid var(--hair);display:flex;align-items:center;gap:28px;padding:13px 28px}
  .brand{display:flex;align-items:baseline;gap:9px;white-space:nowrap}
  .brand .mark{width:9px;height:9px;border-radius:2px;background:var(--needs);box-shadow:0 0 8px 1px var(--needs-glow);transform:translateY(1px)}
  .brand .name{font-family:var(--mono);font-size:13px;letter-spacing:.04em;color:var(--ink-dim)}
  .brand .sub{font-size:12px;color:var(--ink-faint)}
  .hud{display:flex;align-items:baseline;gap:20px;margin-left:4px}
  .hud .stat{display:flex;align-items:baseline;gap:6px}
  .hud .n{font-family:var(--mono);font-size:21px;font-weight:600;letter-spacing:-.01em}
  .hud .lbl{font-size:12.5px;color:var(--ink-dim)}
  .hud .sep{color:var(--hair);font-size:16px}
  .hud .k-needs .n,.hud .k-needs .lbl{color:var(--needs)} .hud .k-run .n{color:var(--run)} .hud .k-idle .n{color:var(--idle)} .hud .k-dun .n,.hud .k-dun .lbl{color:var(--done)}
  .topbar .right{margin-left:auto;display:flex;align-items:center;gap:14px}
  .viewtog{display:flex;border:1px solid var(--hair);border-radius:6px;overflow:hidden}
  .viewtog button{font-family:var(--sans);font-size:12px;padding:5px 12px;background:transparent;color:var(--ink-dim);border:none;border-right:1px solid var(--hair);cursor:pointer}
  .viewtog button:last-child{border-right:none}
  .viewtog button.on{background:var(--bg-elev);color:var(--ink)}
  .clock{font-family:var(--mono);font-size:12px;color:var(--ink-faint);white-space:nowrap}
  .mocktag{font-size:11px;color:var(--ink-faint);border:1px dashed var(--hair);border-radius:4px;padding:3px 8px;white-space:nowrap}

  /* mindmap nav (全部 → 项目 → 任务) */
  .minimap{max-width:1080px;margin:0 auto;padding:10px 24px 0}
  body[data-view="attention"] .minimap{display:none}
  .mind-head{font-family:var(--mono);font-size:11px;letter-spacing:.06em;color:var(--ink-faint);cursor:pointer;display:inline-flex;gap:7px;align-items:center;padding:4px 2px;user-select:none}
  .mind-head:hover{color:var(--ink-dim)} .mind-head .mh-chev{transition:transform .15s}
  .minimap.mclosed .mh-chev{transform:rotate(-90deg)} .minimap.mclosed .mind{display:none}
  .mind{position:relative;display:flex;align-items:center;gap:56px;padding:12px 4px 8px;overflow-x:auto}
  .mind-links{position:absolute;left:0;top:0;width:100%;height:100%;pointer-events:none;z-index:0}
  .mind-root{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;gap:2px;font-family:var(--mono);font-size:10.5px;color:var(--ink-faint);border:1px solid var(--hair);border-radius:9px;padding:9px 13px;background:var(--bg-row);flex:none}
  .mind-root b{font-size:17px;color:var(--ink);font-weight:600}
  .mind-branches{position:relative;z-index:1;display:flex;flex-direction:column;gap:9px}
  .mbranch{display:flex;align-items:center;gap:16px}
  .mnode{display:inline-flex;align-items:center;gap:8px;border:1px solid var(--hair);border-radius:8px;padding:7px 11px;background:var(--bg-row);cursor:pointer;white-space:nowrap;flex:none;transition:border-color .12s}
  .mnode:hover{border-color:var(--ink-faint)} .mnode[data-urg="2"]{border-color:rgba(255,168,64,.4);background:var(--needs-bg)}
  .mnode .mname{font-family:var(--mono);font-size:11.5px;color:var(--ink);max-width:150px;overflow:hidden;text-overflow:ellipsis}
  .mnode .mc{font-size:10.5px;color:var(--ink-faint)}
  .mleaves{display:flex;gap:6px;flex-wrap:wrap;max-width:540px}
  .mleaf{display:inline-flex;align-items:center;gap:5px;font-size:10.5px;color:var(--ink-dim);border:1px solid var(--hair-soft);border-radius:5px;padding:2px 8px;background:var(--bg);max-width:160px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer}
  .mleaf:hover{border-color:var(--ink-faint);color:var(--ink)}

  /* animated status icons */
  .sic{display:inline-flex;align-items:center;justify-content:center;position:relative;flex:none;vertical-align:middle}
  .row>.sic,.proj-head>.sic{justify-self:center}
  .spin{animation:spin .9s linear infinite;transform-origin:center}
  @keyframes spin{to{transform:rotate(360deg)}}
  .ndot .core{position:absolute;inset:26%;border-radius:50%;background:var(--needs);box-shadow:0 0 6px 1px var(--needs-glow)}
  .ndot .ping{position:absolute;inset:8%;border-radius:50%;border:1.5px solid var(--needs);animation:ping 1.7s cubic-bezier(0,0,.2,1) infinite}
  @keyframes ping{0%{transform:scale(.5);opacity:.9}80%,100%{transform:scale(1.6);opacity:0}}
  .idot{border-radius:50%;border:1.6px solid var(--idle);box-sizing:border-box}

  /* board */
  .board{max-width:1080px;margin:0 auto;padding:8px 24px 80px}

  /* attention bands */
  .band{margin-top:18px}
  .band-head{display:flex;align-items:center;gap:10px;padding:6px 8px;user-select:none}
  .band-head .glyph{font-size:13px;width:16px;text-align:center}
  .band-head .htxt{font-size:12.5px;letter-spacing:.06em;font-weight:600}
  .band-head .cnt{font-family:var(--mono);font-size:12px;color:var(--ink-faint)}
  .band-head .rule{flex:1;height:1px;background:var(--hair-soft)}
  .band-head .chev{font-size:11px;color:var(--ink-faint);transition:transform .15s}
  .band-head.clickable{cursor:pointer}
  .band.collapsed .chev{transform:rotate(-90deg)} .band.collapsed .rows{display:none}
  .band[data-band="needs_you"] .band-head .glyph,.band[data-band="needs_you"] .band-head .htxt{color:var(--needs)}
  .band[data-band="running"] .band-head .glyph,.band[data-band="running"] .band-head .htxt{color:var(--run)}
  .band[data-band="idle"] .band-head .glyph,.band[data-band="idle"] .band-head .htxt{color:var(--idle)}
  .band[data-band="done"] .band-head .glyph,.band[data-band="done"] .band-head .htxt{color:var(--done)}
  .band[data-band="paused"] .band-head .glyph,.band[data-band="paused"] .band-head .htxt{color:var(--paused)}
  .band[data-band="done_unread"] .band-head .glyph,.band[data-band="done_unread"] .band-head .htxt{color:var(--done)}
  .sic.dchk{animation:dpulse 1.8s ease-in-out infinite}
  @keyframes dpulse{0%,100%{opacity:1}50%{opacity:.5}}
  .mid.dunread{color:var(--done)}
  .pcounts .gdone{color:var(--done)}
  .row[data-band="done_unread"]{box-shadow:inset 3px 0 0 var(--done)}

  /* tiers */
  .tier-head{display:flex;align-items:center;gap:11px;font-family:var(--mono);font-size:11px;letter-spacing:.12em;
    color:var(--ink-faint);text-transform:uppercase;margin:20px 8px 4px;user-select:none}
  .tier-head .tx{white-space:nowrap}
  .tier-head::after{content:'';flex:1;height:1px;background:var(--hair-soft)}
  .tier-head.side{opacity:.75}
  .zone[data-tier="side"] .proj-head{padding:9px 12px}
  .zone[data-tier="side"] .pname{color:var(--ink-dim)}

  /* project stream line */
  .proj{margin-top:4px;border:1px solid transparent;border-radius:10px;background:transparent;transition:background .14s}
  .proj.dragging{opacity:.45}
  .proj.flash{outline:1px solid var(--needs-edge);outline-offset:-1px}
  .proj-head{display:grid;grid-template-columns:18px 14px 11px minmax(96px,168px) auto 1fr auto;
    align-items:center;gap:11px;padding:12px 12px;border-radius:9px;cursor:pointer;transition:background .12s;min-height:46px}
  .proj-head:hover{background:var(--bg-row-hover)}
  .dragh{justify-self:center;color:var(--hair);font-size:13px;cursor:grab;line-height:1}
  .proj-head:hover .dragh{color:var(--ink-faint)}
  .proj-head .chev{font-size:11px;color:var(--ink-faint);justify-self:center;transition:transform .15s}
  .proj:not(.collapsed) .proj-head .chev{transform:rotate(90deg)}
  .pdot{width:9px;height:9px;border-radius:50%;justify-self:center}
  .pdot.needs_you{background:var(--needs);box-shadow:0 0 6px 0 rgba(255,168,64,.4)}
  .pdot.running{background:var(--run);animation:pulse 1.9s ease-in-out infinite}
  .pdot.idle{background:transparent;border:1.5px solid var(--idle)}
  .pname{font-family:var(--mono);font-size:13px;color:var(--ink);letter-spacing:.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .pcounts{font-size:11.5px;color:var(--ink-faint);white-space:nowrap}
  .pcounts .amb{color:var(--needs)} .pcounts .run{color:var(--run)} .pcounts .dim{color:var(--ink-faint)}
  .pstrip{display:flex;gap:6px;justify-self:end;flex-wrap:wrap;justify-content:flex-end;align-items:center;max-height:46px;overflow:hidden}
  .it{display:inline-flex;align-items:center;gap:5px;padding:3px 8px;border:1px solid var(--hair);border-radius:5px;
    font-size:11px;color:var(--ink-dim);max-width:140px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;background:var(--bg-row)}
  .it.more{color:var(--ink-faint);border-style:dashed}
  .ptimer{font-family:var(--mono);font-size:11.5px;color:var(--ink-faint);justify-self:end;white-space:nowrap}
  .proj-head[data-urg="2"]{box-shadow:inset 3px 0 0 var(--needs-edge);background:var(--needs-bg);border-radius:10px}
  .proj-head[data-urg="2"] .ptimer{color:var(--needs)}
  .proj-head[data-urg="2"]:hover{background:rgba(255,168,64,.1)}
  /* 展开:不是白框,而是一层极淡的区域底 + 主次连接线,凸显「正在看的这组」 */
  .proj:not(.collapsed){background:var(--proj-open);border-radius:11px;margin:11px 0;padding-bottom:7px}
  .proj:not(.collapsed) .proj-head{border-radius:11px 11px 0 0}
  .proj:not(.collapsed) .pstrip{display:none}
  /* 子任务挂在一条从父项目引下的 stream line 上,横向小枝连接每条 */
  .proj .rows{padding:3px 12px 2px 14px}
  .proj:not(.collapsed) .rows{margin-left:27px;padding-left:19px;border-left:1.5px solid var(--connector)}
  .proj:not(.collapsed) .rows .row{position:relative}
  .proj:not(.collapsed) .rows .row::before{content:'';position:absolute;left:-19px;top:50%;width:13px;height:1.5px;background:var(--connector)}
  .proj.collapsed .rows{display:none}
  @keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(86,211,182,0)}50%{box-shadow:0 0 8px 1px rgba(86,211,182,.6)}}

  /* row */
  .row{display:grid;grid-template-columns:14px minmax(168px,250px) 1fr 52px 30px;align-items:center;gap:13px;
    padding:9px 14px;border-radius:7px;cursor:pointer;border:1px solid transparent;transition:background .12s}
  .row:hover{background:var(--bg-row-hover)}
  .dot{width:9px;height:9px;border-radius:50%;justify-self:center}
  .dot.needs_you{background:var(--needs);box-shadow:0 0 6px 0 rgba(255,168,64,.4)}
  .dot.running{background:var(--run);animation:pulse 1.9s ease-in-out infinite}
  .dot.idle{background:transparent;border:1.5px solid var(--idle)}
  .dot.done{background:var(--done)} .dot.paused{background:transparent;border:1.5px solid var(--paused)}
  .name{min-width:0}
  .name .t{font-size:13.5px;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;user-select:text;cursor:text}
  .name .ws{font-family:var(--mono);font-size:10.5px;color:var(--ink-faint);margin-top:1px;display:flex;align-items:center;gap:6px}
  .name .ws .lv{color:var(--hair);border:1px solid var(--hair);border-radius:3px;padding:0 4px;font-size:9.5px}
  body[data-view="project"] .name .ws{display:none}
  .mid{min-width:0;font-size:12.5px;color:var(--ink-dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:flex;align-items:center;gap:9px}
  .mid.needs_you{color:var(--needs)} .mid.idle{color:var(--ink-faint)}
  .mid .rtext{overflow:hidden;text-overflow:ellipsis}
  .bar{flex:none;width:64px;height:5px;border-radius:3px;background:var(--hair);overflow:hidden}
  .bar>i{display:block;height:100%;background:var(--run);border-radius:3px}
  .pct{font-family:var(--mono);font-size:11px;color:var(--run);flex:none}
  .chips{display:flex;gap:5px;align-items:center;justify-self:end;flex-wrap:nowrap}
  .chip{font-family:var(--mono);font-size:10.5px;line-height:1;padding:3px 6px;border:1px solid var(--hair);border-radius:4px;color:var(--ink-dim);white-space:nowrap;display:inline-flex;gap:4px;align-items:center}
  .chip .k{font-weight:700} .chip.mr .k{color:var(--mr)} .chip.cr .k{color:var(--cr)} .chip.cd .k{color:var(--cd)}
  .chip.link:hover{border-color:var(--ink-faint);color:var(--ink)}
  .timer{font-family:var(--mono);font-size:11.5px;color:var(--ink-faint);text-align:right;justify-self:end}
  .row[data-band="needs_you"] .timer{color:var(--needs)}
  .go{justify-self:center;width:26px;height:26px;border-radius:6px;border:1px solid var(--hair);color:var(--ink-faint);display:flex;align-items:center;justify-content:center;font-size:14px;transition:all .12s}
  .row:hover .go{border-color:var(--ink-faint);color:var(--ink);background:var(--bg-elev)}
  .row[data-band="needs_you"]{background:var(--needs-bg);box-shadow:inset 3px 0 0 var(--needs-edge)}
  .row[data-band="needs_you"]:hover{background:rgba(255,168,64,.11)}
  .row[data-band="running"]{background:var(--run-bg)}
  .row[data-band="idle"] .name .t{color:var(--ink-dim)}
  .row[data-band="done"],.row[data-band="paused"]{opacity:.72}

  /* expand */
  .detail{display:none;grid-column:1/-1;margin:2px 6px 10px 6px;padding:14px 16px;background:var(--bg-elev);border:1px solid var(--hair);border-radius:8px;border-left:3px solid var(--hair)}
  .row.open + .detail{display:block}
  .row[data-band="needs_you"].open + .detail{border-left-color:var(--needs-edge)}
  .row[data-band="running"].open + .detail{border-left-color:var(--run)}
  /* DD-025: sub-cards nested under a parent row */
  .subcards{margin:-1px 8px 9px 30px;display:flex;flex-direction:column;gap:3px}
  .subrow{display:flex;align-items:center;gap:8px;padding:5px 9px;border-radius:6px;border:1px solid var(--hair-soft);border-left:2px solid var(--connector);background:var(--bg-row);cursor:pointer}
  .subrow:hover{border-color:var(--ink-faint);background:var(--bg-row-hover)}
  .subrow .sr-name{font-size:12px;color:var(--ink);white-space:nowrap;flex:none;max-width:210px;overflow:hidden;text-overflow:ellipsis}
  .subrow .sr-prog{flex:1;min-width:0;font-size:11px;color:var(--ink-faint);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .subrow .sr-go{flex:none;width:22px;height:22px;border-radius:5px;border:1px solid var(--hair);background:transparent;color:var(--ink-faint);cursor:pointer;font-size:12px}
  .subrow .sr-go:hover{border-color:var(--run);color:var(--run)}
  .subrow .sr-exp{flex:none;width:22px;height:22px;border-radius:5px;border:1px solid var(--hair);background:transparent;color:var(--ink-faint);cursor:pointer;font-size:11px;line-height:1;transition:transform .15s}
  .subrow .sr-exp:hover{border-color:var(--ink-dim);color:var(--ink)}
  .subrow .sr-close{flex:none;display:flex;align-items:center;justify-content:center;width:20px;height:22px;border:none;border-radius:5px;background:transparent;color:var(--ink-faint);cursor:pointer;font-size:16px;line-height:1;opacity:.45;transition:opacity .12s,color .12s,background .12s}
  .subrow:hover .sr-close{opacity:.8}
  .subrow .sr-close:hover{opacity:1;color:var(--needs);background:var(--needs-bg)}
  .subwrap.open .sr-exp{transform:rotate(180deg)}
  .subdetail{display:none;margin:2px 8px 5px 16px;padding:9px 11px;border-left:2px solid var(--hair);background:var(--bg-elev);border-radius:0 7px 7px 0;font-size:11.5px;color:var(--ink-dim);line-height:1.55}
  .subwrap.open .subdetail{display:block}
  .subdetail .sd-prog{white-space:pre-wrap}
  .subdetail .sd-next{margin-top:6px} .subdetail .sd-next b{color:var(--ink-faint);font-weight:600;margin-right:6px}
  .subdetail .sd-aw b{color:var(--needs)}
  .subdetail .sd-res{margin-top:8px;display:flex;flex-direction:column;gap:5px}
  .name .ws .lv.subc{color:var(--ink-dim);border-color:var(--hair)}
  .name .ws .lv.subc.needs{color:var(--needs);border-color:var(--needs-edge)}
  .detail .summary{font-size:12.5px;color:var(--ink-dim);margin-bottom:9px}
  .detail .fresh-tag{font-size:10.5px;color:var(--run);font-family:var(--mono);letter-spacing:.04em;margin-bottom:7px}
  .detail .await-line{font-size:12.5px;color:var(--needs);background:var(--needs-bg);border:1px solid var(--needs-edge);border-radius:7px;padding:7px 10px;margin:2px 0 8px;line-height:1.5}
  .detail .next-line{font-size:12.5px;color:var(--ink-dim);border-left:2px solid var(--run);padding:2px 0 2px 9px;margin:2px 0 9px;line-height:1.5}
  .detail .sealed-note{font-size:11.5px;color:var(--ink-faint);background:var(--proj-open);border:1px solid var(--hair-soft);border-radius:7px;padding:7px 9px;margin-bottom:10px;line-height:1.5}
  .detail .sealed-note code{font-family:var(--mono);font-size:10.5px;color:var(--ink-dim)}
  .name .ws .lv.sealed{color:var(--ink-faint);border-color:var(--hair-soft)}
  .name .ws .lv.arch{color:var(--done);border-color:color-mix(in srgb,var(--done) 40%,transparent)}
  .row.is-sealed .name .t{color:var(--ink-dim)}
  .detail .progress{font-size:13px;color:var(--ink);margin-bottom:12px;line-height:1.5}
  .detail .prog-steps{list-style:none;margin:2px 0 12px;padding:0;display:flex;flex-direction:column;gap:5px}
  .detail .prog-steps li{font-size:12.5px;color:var(--ink);padding-left:17px;position:relative;line-height:1.5}
  .detail .prog-steps li::before{content:'';position:absolute;left:3px;top:7px;width:5px;height:5px;border-radius:50%;background:var(--run);box-shadow:0 0 0 3px var(--run-bg)}
  .detail .prog-steps li:last-child{color:var(--ink);font-weight:500}
  .detail .sectit{font-family:var(--mono);font-size:10.5px;letter-spacing:.08em;color:var(--ink-faint);text-transform:uppercase;margin:11px 0 6px}
  .detail ul{list-style:none}
  .detail .blk{font-size:12.5px;color:var(--needs);padding:2px 0;display:flex;gap:8px}
  .detail .blk .b{color:var(--needs-edge)}
  .detail .meta{display:flex;gap:18px;flex-wrap:wrap;margin-top:6px;font-family:var(--mono);font-size:11px;color:var(--ink-faint)}
  .detail .acts{display:flex;gap:10px;margin-top:14px}
  .btn{font-size:12.5px;padding:7px 13px;border-radius:6px;border:1px solid var(--hair);background:var(--bg-row);color:var(--ink);cursor:pointer;font-family:var(--sans)}
  .btn.primary{background:rgba(255,168,64,.14);border-color:var(--needs-edge);color:var(--needs)}
  .btn:hover{border-color:var(--ink-faint)}
  .btn.danger{color:#d9694e} .btn.danger:hover{border-color:#d9694e;background:rgba(217,105,78,.08)}
  .acts-sp{flex:1}
  .detail .chips-full{display:flex;gap:10px;flex-wrap:wrap;margin-top:4px}
  .detail .res-noise{font-size:11px;color:var(--ink-faint);margin-top:6px}

  .disc{position:fixed;right:14px;bottom:12px;font-size:10.5px;color:var(--ink-faint);background:var(--disc-bg);backdrop-filter:blur(6px);border:1px dashed var(--hair);border-radius:5px;padding:5px 9px;max-width:300px;line-height:1.4;z-index:30}
  .iconbtn{font-size:14px;line-height:1;padding:5px 9px;border:1px solid var(--hair);border-radius:6px;background:transparent;color:var(--ink-dim);cursor:pointer}
  .iconbtn.spinning{animation:spin 1s linear infinite;color:var(--run);border-color:var(--run)}
  .iconbtn:hover{border-color:var(--ink-faint);color:var(--ink)}
  .newbtn{font-family:var(--sans);font-size:12.5px;font-weight:600;line-height:1;padding:7px 13px;border:1px solid color-mix(in srgb,var(--run) 55%,transparent);border-radius:7px;background:var(--run-bg);color:var(--run);cursor:pointer;white-space:nowrap}
  .newbtn:hover{border-color:var(--run);background:color-mix(in srgb,var(--run) 14%,transparent)}
  /* new-session dialog */
  .nsdlg{position:fixed;inset:0;z-index:80;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center}
  .nsbox{width:min(520px,92vw);background:var(--bg-elev);border:1px solid var(--hair);border-radius:14px;box-shadow:0 24px 70px rgba(0,0,0,.5);padding:22px 22px 18px}
  .nsbox h3{margin:0 0 4px;font-size:15px;color:var(--ink)}
  .nsbox .nssub{font-size:12px;color:var(--ink-dim);margin-bottom:16px;line-height:1.5}
  .nsbox label{display:block;font-size:11px;font-family:var(--mono);letter-spacing:.05em;color:var(--ink-faint);text-transform:uppercase;margin:0 0 6px}
  .nsbox input[type=text]{width:100%;box-sizing:border-box;font-family:var(--mono);font-size:13px;padding:10px 12px;border:1px solid var(--hair);border-radius:8px;background:var(--bg-row);color:var(--ink)}
  .nsbox input[type=text]:focus{outline:none;border-color:var(--run)}
  .nsbox .nstext{width:100%;box-sizing:border-box;font-family:var(--sans);font-size:13px;line-height:1.5;padding:10px 12px;border:1px solid var(--hair);border-radius:8px;background:var(--bg-row);color:var(--ink);resize:vertical;min-height:62px}
  .nsbox .nstext:focus{outline:none;border-color:var(--run)}
  .nschips{display:flex;flex-wrap:wrap;gap:6px;margin:10px 0 4px}
  .nschip{font-family:var(--mono);font-size:11px;padding:4px 9px;border:1px solid var(--hair-soft);border-radius:6px;background:var(--bg-row);color:var(--ink-dim);cursor:pointer;max-width:240px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .nschip:hover{border-color:var(--run);color:var(--ink)}
  .nswtrow{display:flex!important;align-items:center;gap:8px;font-family:var(--sans)!important;font-size:12.5px!important;
    letter-spacing:normal!important;text-transform:none!important;color:var(--ink-dim)!important;margin:16px 0 8px!important;cursor:pointer}
  .nswtrow input{cursor:pointer}
  .nsbox input[type=text]:disabled{opacity:.4;cursor:not-allowed}
  .nsacts{display:flex;justify-content:flex-end;gap:9px;margin-top:18px}
  .nsacts .btn{font-family:var(--sans);font-size:12.5px;padding:8px 16px;border:1px solid var(--hair);border-radius:7px;background:transparent;color:var(--ink-dim);cursor:pointer}
  .nsacts .btn.primary{border-color:var(--run);background:var(--run-bg);color:var(--run);font-weight:600}
  .nsacts .btn:hover{color:var(--ink)}
  .disc b{color:var(--idle);font-weight:600}
  .toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(20px);background:var(--bg-elev);border:1px solid var(--hair);border-radius:7px;padding:9px 16px;font-size:12.5px;color:var(--ink);opacity:0;transition:all .2s;z-index:40;pointer-events:none}
  /* conversation history modal (DD-015 Stage 3a) */
  .histmask{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:60;display:flex;align-items:center;justify-content:center;padding:40px}
  .histbox{background:var(--bg-elev);border:1px solid var(--hair);border-radius:12px;max-width:760px;width:100%;max-height:82vh;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.4)}
  .histhead{display:flex;align-items:center;justify-content:space-between;padding:13px 18px;border-bottom:1px solid var(--hair);font-size:13px;color:var(--ink-dim);font-family:var(--mono)}
  .histbody{overflow-y:auto;padding:16px 18px;display:flex;flex-direction:column;gap:13px}
  .ht{max-width:82%}
  .ht.user{align-self:flex-end} .ht.assistant{align-self:flex-start}
  .ht-role{font-size:10.5px;color:var(--ink-faint);margin-bottom:3px;font-family:var(--mono)}
  .ht.user .ht-role{text-align:right}
  .ht-text{font-size:13px;line-height:1.6;padding:9px 13px;border-radius:10px;white-space:pre-wrap;word-break:break-word}
  .ht.user .ht-text{background:var(--needs-bg);border:1px solid var(--hair)}
  .ht.assistant .ht-text{background:var(--bg-row);border:1px solid var(--hair-soft);color:var(--ink-dim)}
  .histfoot{display:flex;gap:8px;padding:12px 18px;border-top:1px solid var(--hair)}
  .histin{flex:1;background:var(--bg-row);border:1px solid var(--hair);border-radius:8px;padding:9px 12px;color:var(--ink);font-size:13px;font-family:var(--sans)}
  .histin:focus{outline:none;border-color:var(--ink-faint)}
  /* 键盘快捷键帮助 (交互优化) */
  .kbdbox{background:var(--bg-elev);border:1px solid var(--hair);border-radius:12px;max-width:392px;width:100%;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.4)}
  .kbdhead{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--hair);font-size:13px;color:var(--ink-dim);font-family:var(--mono)}
  .kbdbody{padding:8px 16px 14px;display:flex;flex-direction:column}
  .kbdrow{display:flex;align-items:center;gap:14px;padding:7px 0;border-bottom:1px solid var(--hair-soft)}
  .kbdrow:last-child{border-bottom:none}
  .kbdkeys{flex:none;min-width:120px;display:flex;gap:5px;align-items:center}
  .kbddesc{font-size:12.5px;color:var(--ink-dim)}
  kbd{font-family:var(--mono);font-size:11px;line-height:1;padding:4px 7px;border:1px solid var(--hair);border-bottom-width:2px;border-radius:5px;background:var(--bg-row);color:var(--ink);white-space:nowrap}
  /* AI 建议下一句 (DD-020 B) */
  .suggbox{background:var(--bg-elev);border:1px solid var(--hair);border-radius:12px;max-width:640px;width:100%;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.4)}
  .sugghead{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--hair);font-size:12.5px;color:var(--ink-dim);font-family:var(--mono)}
  .sugghead code{color:var(--ink)}
  .suggbody{padding:12px 14px;display:flex;flex-direction:column;gap:8px}
  .sugg-hint{font-size:11px;color:var(--ink-faint);margin-bottom:2px}
  .sugg-load{font-size:12.5px;color:var(--ink-faint);padding:14px;text-align:center}
  .sugg-opt{text-align:left;font-size:13px;line-height:1.5;color:var(--ink);background:var(--bg-row);border:1px solid var(--hair);border-radius:9px;padding:10px 12px;cursor:pointer;font-family:var(--sans)}
  .sugg-opt:hover{border-color:var(--run);background:var(--bg-row-hover)}
  /* embedded ttyd terminal panel (DD-018 §B) — resume a session IN the cockpit */
  .termmask{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:70;display:flex;align-items:center;justify-content:center;padding:26px}
  .termbox{background:var(--bg-elev);border:1px solid var(--hair);border-radius:12px;width:min(1120px,95vw);height:min(80vh,880px);display:flex;flex-direction:column;overflow:hidden;box-shadow:0 24px 70px rgba(0,0,0,.5)}
  /* DD-025: webterminal left「会话族」dock — the current main card's family (主卡 +
     子卡), live status, click to switch/open, + a 「+子卡」 button. Floats OUTSIDE the
     terminal (mirror of the right resource dock) so the solid terminal keeps full size;
     panel is transparent, items are individual floating chips. */
  .termside{position:fixed;z-index:71;top:calc((100vh - min(80vh,880px))/2);right:calc(50% + 558px);
    width:264px;max-height:min(80vh,880px);overflow-y:auto;overflow-x:visible;display:flex;flex-direction:column;gap:7px;padding:2px 8px 6px}
  .termside[hidden]{display:none}
  .tside-h{font-size:8.5px;font-family:var(--mono);letter-spacing:.13em;color:var(--ink-dim);text-transform:uppercase;font-weight:700;margin:0 0 1px 2px;text-shadow:0 1px 4px rgba(0,0,0,.7)}
  .tside-item{position:relative;display:flex;align-items:center;gap:8px;box-sizing:border-box;width:100%;height:33px;padding:0 11px;text-align:left;
    border:1px solid var(--hair);border-left:2.5px solid var(--connector);border-radius:8px;background:var(--bg-elev);box-shadow:0 4px 13px rgba(0,0,0,.38);
    color:var(--ink-dim);cursor:pointer;font-family:var(--sans);font-size:12px;transition:transform .14s,border-color .15s,box-shadow .15s}
  .tside-item:hover{border-color:var(--run);transform:translateX(3px);box-shadow:0 9px 22px rgba(0,0,0,.5)}
  .tside-item.on{border-left-color:var(--run);color:var(--ink);border-color:color-mix(in srgb,var(--run) 45%,transparent)}
  .tside-item.sub{margin-left:15px;width:calc(100% - 15px)}
  .tside-item.sub::before{content:'';position:absolute;left:-9px;top:50%;width:8px;height:1px;background:var(--connector)}
  .tside-item .ts-name{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .tside-item .ts-open{width:6px;height:6px;border-radius:50%;background:var(--run);box-shadow:0 0 5px var(--run-glow);flex:none}
  .tside-item .ts-close{flex:none;display:flex;align-items:center;justify-content:center;width:18px;height:18px;border-radius:4px;color:var(--ink-faint);font-size:15px;line-height:1;opacity:.35;transition:opacity .12s,color .12s,background .12s}
  .tside-item:hover .ts-close{opacity:.75}
  .tside-item .ts-close:hover{opacity:1;color:var(--needs);background:var(--needs-bg)}
  .tside-item.pending{border-style:dashed;border-left-color:var(--run);color:var(--ink-faint);cursor:default}
  .tside-item.pending:hover{transform:none;border-color:var(--hair);box-shadow:0 4px 13px rgba(0,0,0,.38)}
  .tside-item.pending .ts-spin{width:11px;height:11px;flex:none;border:1.6px solid var(--hair);border-top-color:var(--run);border-radius:50%;animation:tlspin .8s linear infinite}
  .tside-add{box-sizing:border-box;width:100%;height:31px;margin-top:2px;border:1px dashed var(--hair);border-radius:8px;background:color-mix(in srgb,var(--bg-elev) 70%,transparent);color:var(--ink-faint);cursor:pointer;font-family:var(--sans);font-size:12px;box-shadow:0 4px 13px rgba(0,0,0,.3)}
  .tside-add:hover{border-color:var(--run);color:var(--run)}
  /* Narrow screens: no gutter to float in → dock both side panels beside a shrunk
     terminal (mirror of .termres). */
  @media (max-width:1640px){
    .termside{position:static;transform:none;right:auto;top:auto;flex:none;width:208px;
      height:min(80vh,880px);max-height:none;margin-right:14px;padding:4px 6px}
  }
  .termhead{display:flex;align-items:center;gap:9px;padding:10px 15px;border-bottom:1px solid var(--hair);font-size:12.5px;color:var(--ink-dim);font-family:var(--mono)}
  .termhead .tdot{width:7px;height:7px;border-radius:50%;background:var(--run);box-shadow:0 0 0 3px var(--run-bg);flex:none}
  .termhead code{color:var(--ink);font-size:11.5px}
  .termhead .tsp{flex:1}
  .termtabs{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
  .ttab{font-size:11px;font-family:var(--mono);background:var(--bg-row);border:1px solid var(--hair);border-radius:6px;padding:3px 7px;cursor:pointer;color:var(--ink-dim);display:inline-flex;gap:6px;align-items:center}
  .ttab.on{border-color:var(--run);color:var(--ink)}
  .ttab b{color:var(--ink-faint);font-weight:600;cursor:pointer;font-size:12px;line-height:1}
  .ttab b:hover{color:var(--needs)}
  .ttab .tt-l{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:170px}
  .ttab .sic{flex:none}
  .ttab.closed{opacity:.62;border-style:dashed}   /* 一级卡片在册但终端未开 — 点开 */
  /* 左侧会话族:一级卡片标题 + 二级(子卡)分组小标题 */
  .tside-h{display:flex;align-items:center;gap:6px}
  .tside-h .tside-h-n{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--ink);font-size:11px;letter-spacing:.02em;text-transform:none;font-weight:600}
  .tside-sub-h{font-size:8.5px;font-family:var(--mono);letter-spacing:.13em;color:var(--ink-faint);text-transform:uppercase;font-weight:700;margin:7px 0 2px 2px;text-shadow:0 1px 4px rgba(0,0,0,.7)}
  .tside-empty{font-size:11px;color:var(--ink-faint);padding:4px 2px 2px;font-family:var(--mono)}
  /* #3 当前卡片进度时间线 — 横在终端顶部的一条 */
  .termtl{display:flex;align-items:center;gap:10px;padding:8px 14px;border-bottom:1px solid var(--hair);background:color-mix(in srgb,var(--bg-row) 60%,transparent);overflow:hidden}
  .termtl[hidden]{display:none}
  .termtl .ttl-cap{flex:none;font-family:var(--mono);font-size:8.5px;letter-spacing:.14em;text-transform:uppercase;font-weight:700;color:var(--ink-faint)}
  .ttl-track{display:flex;align-items:center;gap:0;overflow-x:auto;min-width:0;flex:1;padding-bottom:2px}
  .ttl-node{position:relative;display:flex;align-items:center;gap:6px;flex:none;padding-right:14px;color:var(--ink-faint)}
  .ttl-node:not(:last-child)::after{content:'';width:18px;height:1.5px;background:var(--connector);flex:none;margin-left:2px}
  .ttl-node .ttl-dot{width:8px;height:8px;border-radius:50%;border:1.5px solid var(--ink-faint);background:var(--bg-elev);flex:none;box-sizing:border-box}
  .ttl-node.done .ttl-dot{background:var(--run);border-color:var(--run)}
  .ttl-node.live .ttl-dot{box-shadow:0 0 0 3px var(--run-bg);animation:pulse 1.9s ease-in-out infinite}
  .ttl-node.next .ttl-dot{border-color:var(--needs);border-style:dashed;background:transparent}
  .ttl-node .ttl-lbl{font-size:11px;color:var(--ink-dim);white-space:nowrap;max-width:200px;overflow:hidden;text-overflow:ellipsis}
  .ttl-node.live .ttl-lbl{color:var(--ink)}
  .ttl-node.next .ttl-lbl{color:var(--needs)}
  .empty-state{max-width:560px;margin:64px auto;text-align:center;padding:28px;border:1px solid var(--hair-soft);border-radius:12px;background:var(--bg-row)}
  .empty-state.err{border-color:var(--needs-edge);background:var(--needs-bg)}
  .empty-state .es-t{font-size:15px;font-weight:600;color:var(--ink);margin-bottom:8px}
  .empty-state.err .es-t{color:var(--needs)}
  .empty-state .es-b{font-size:12.5px;color:var(--ink-dim);line-height:1.6;margin:6px 0}
  .empty-state code{font-family:var(--mono);font-size:11.5px;background:var(--bg-elev);border:1px solid var(--hair);border-radius:4px;padding:1px 5px}
  .empty-state .es-log{text-align:left;font-family:var(--mono);font-size:10.5px;color:var(--ink-faint);background:var(--bg-elev);border:1px solid var(--hair-soft);border-radius:7px;padding:9px 11px;margin:10px 0;max-height:160px;overflow:auto;white-space:pre-wrap}
  .empty-state .es-spin{width:24px;height:24px;margin:0 auto 14px;border:3px solid var(--hair);border-top-color:var(--run);border-radius:50%;animation:tlspin .8s linear infinite}
  .termbody{flex:1;min-height:0;display:flex}
  .termstack{flex:1;min-height:0;display:flex;position:relative}
  /* DD-021②: a simple single-column list — every resource shown, one per line,
     grouped into 外部资源 / 代码位置. Text badge (MR/CR/…) + title; click to open
     or copy. No decks/fans — just legible and complete. (Fancier layouts later.) */
  .termres{position:fixed;z-index:71;top:50%;transform:translateY(-50%);left:calc(50% + 558px);
    width:250px;max-height:92vh;overflow-y:auto;overflow-x:visible;display:flex;flex-direction:column;gap:8px;padding:6px 8px}
  .termres[hidden]{display:none}
  /* Narrow screens (laptops) have no gutter to float in → dock the column beside a
     slightly-shrunk terminal so resources stay visible. Panel stays TRANSPARENT —
     the chips float as individual tags (each has its own shadow), not one block. */
  @media (max-width:1640px){
    .termbox{width:min(1120px, calc(95vw - 256px))}
    .termres{position:static;transform:none;left:auto;top:auto;flex:none;width:236px;
      height:min(80vh,880px);max-height:none;margin-left:14px;padding:4px 6px;overflow-y:auto}
  }
  .termres .tr-h{font-size:8.5px;font-family:var(--mono);letter-spacing:.13em;color:var(--ink-dim);text-transform:uppercase;font-weight:700;margin:0 0 2px 2px;text-shadow:0 1px 4px rgba(0,0,0,.7)}
  .termres .tr-h2{margin-top:8px}
  .reschip{display:flex;align-items:center;gap:7px;box-sizing:border-box;width:100%;height:29px;padding:0 10px 0 7px;
    border:1px solid var(--hair);border-left-width:2.5px;border-radius:8px;background:var(--bg-elev);
    box-shadow:0 4px 13px rgba(0,0,0,.38);
    text-decoration:none;text-align:left;cursor:pointer;overflow:hidden;transition:transform .14s,border-color .15s,box-shadow .15s}
  .reschip:hover{border-color:var(--run);transform:translateX(-3px);box-shadow:0 9px 22px rgba(0,0,0,.5)}
  .reschip.loc:hover{border-color:var(--ink-dim)}
  .reschip.nolink{cursor:default}
  .reschip .rc-ic{flex:none;display:flex;align-items:center;justify-content:center;height:15px;padding:0 5px;
    font-family:var(--mono);font-size:8px;font-weight:700;letter-spacing:.04em;border-radius:4px;
    background:var(--bg-row);border:1px solid var(--hair);color:var(--ink-dim)}
  .reschip .rc-l{flex:1;min-width:0;font-size:11px;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .reschip.loc .rc-l{font-family:var(--mono);font-size:10.5px}
  .reschip .rc-sub{flex:none;max-width:0;opacity:0;overflow:hidden;white-space:nowrap;font-size:8.5px;font-family:var(--mono);color:var(--ink-faint);transition:max-width .2s,opacity .2s}
  .reschip:hover .rc-sub{max-width:92px;opacity:1}
  .reschip.k-mr,.reschip.k-pr{border-left-color:var(--mr)} .reschip.k-mr .rc-ic,.reschip.k-pr .rc-ic{color:var(--mr);border-color:color-mix(in srgb,var(--mr) 50%,transparent)}
  .reschip.k-cr{border-left-color:var(--cr)} .reschip.k-cr .rc-ic{color:var(--cr);border-color:color-mix(in srgb,var(--cr) 50%,transparent)}
  .reschip.k-issue{border-left-color:var(--needs)} .reschip.k-issue .rc-ic{color:var(--needs);border-color:var(--needs-edge)}
  .reschip.k-deployment{border-left-color:var(--run)} .reschip.k-deployment .rc-ic{color:var(--run);border-color:color-mix(in srgb,var(--run) 50%,transparent)}
  .reschip.k-doc{border-left-color:var(--cd)} .reschip.k-doc .rc-ic{color:var(--cd);border-color:color-mix(in srgb,var(--cd) 50%,transparent)}
  .reschip.k-branch,.reschip.k-tag,.reschip.k-worktree,.reschip.k-dir,.reschip.k-other{border-left-color:var(--ink-faint)}
  /* code-location items in the CARD DETAIL stay static rows (not floating chips) */
  .loc-item{position:relative;box-sizing:border-box;display:flex;flex-direction:column;gap:4px;
    width:100%;padding:9px 12px;border-radius:10px;text-align:left;font:inherit;cursor:pointer;
    border:1px solid var(--hair);background:var(--bg-elev)}
  .loc-item:hover{border-color:var(--ink-dim)}

<body>
  <div class="topbar">

  <!-- 桌宠 + tips 气泡 (DD-006,从 classic 迁移)。loadDerived() 填充,
       至少有一条 tip 才显示。点击换下一句,拖动可移动。 -->
  <div class="tips-bubble" id="tips-ticker" hidden title="点一下听下一句 · 拖动可移动">
    <div class="tt-pet" id="tt-kind" aria-hidden="true"></div>
    <div class="tt-balloon">
      <span class="tt-lead" id="tt-lead"></span>
      <span class="tt-text" id="tt-text"></span>

         hidden title="查看来源">↗</a>

  <script>
  const ORIGIN = location.origin;
  let DATA = {counts:{}, rows:[]};
  let LOCATIONS = {};        // session_id -> {zellij_pane_id, zellij_session, cwd}
  const OPEN = new Set();   // expanded initiative ids — preserved across re-renders
  const PCOLLAPSE = {};      // ws -> 'o'|'c' : manual project collapse override
  let lastSig = null;        // skip re-render when nothing actually changed
  let MINDMAP = {workspaces:[]};
  let ARCHIVED = [];          // [{ws_name, init, archived_at}] — filed-away cards
  let LIVE = {};
  let SYNC = {};            // first-sync health {state,reason,log_tail} from /api/data
  let CLAUDE_OK = true;     // is the `claude` CLI available (precondition for sync)
  const NEEDS_RE = /待用户|待 ?user|用户确认|用户决定|用户反馈|需确认|待确认|权限确认|等你/;
  function humanIdle(iso){ if(!iso) return ''; const u=Date.parse(iso); if(isNaN(u)) return '';
    let s=(Date.now()-u)/1000; if(s<0)s=0;
    if(s<3600) return Math.floor(s/60)+'m'; if(s<86400) return Math.floor(s/3600)+'h'; return Math.floor(s/86400)+'天'; }
  function idleSecs(iso){ const u=Date.parse(iso); return isNaN(u)?0:Math.max(0,(Date.now()-u)/1000); }
  // ms-timestamp of this week's Monday 00:00 (local) — the 本周完成 cutoff.
  function weekStartTs(){ const d=new Date(); d.setHours(0,0,0,0); d.setDate(d.getDate()-((d.getDay()+6)%7)); return d.getTime(); }
  // band = real status + live telemetry + blocker text (DD-015)
  function bandFor(init){
    // DD-030: "准备中" is an ORTHOGONAL badge (a card with no AI summary yet), NOT a
    // band. The band always comes from the canonical live→classify logic below — even
    // for a pending card — so a 准备中 card that's waiting on you reads 等你, one that's
    // generating reads 进行中, etc. (The old code forced pending→running, which both
    // lied about status and tangled the band logic — the "状态转换一团糟" root.)
    // DD-019: sealed historical cards are frozen achievements (no live
    // session); they live in the collapsible done/archive band.
    if(init.sealed) return {band:'done'};
    const sids=init.sessions||[]; let run=false,need=false,dun=false,idle=false,since=null,reason=null;
    for(const s of sids){ const r=LIVE[s]; if(!r)continue;
      if(r.status==='needs_you'){need=true; reason=r.reason; since=r.status_since||since;}
      else if(r.status==='running'){run=true; since=r.status_since||since;}
      else if(r.status==='done_unread'){dun=true; if(!since)since=r.status_since;}
      else if(r.status==='idle'){ // a still-open session, only "live" if recent
        const u=Date.parse(r.status_since||''); if(!isNaN(u)&&(Date.now()-u)<24*3600000){idle=true; if(!since)since=r.status_since;} } }
    // Live telemetry WINS over a stale classify status. A session that is
    // running / waiting-on-you / freshly-finished / still-open(idle) is NOT
    // "done & filed away" — so it must not collapse into 已完成 just because
    // classify marked status==='done' from the last turn's status_guess.
    if(need) return {band:'needs_you', reason:reason||init.awaiting_user||'等你确认下一步', since};
    if(run) return {band:'running', activity:'AI 进行中', since};
    // DD-020: awaiting_user is the strongest non-live signal — the last turn
    // ended blocked on you. It outranks done_unread ("待查看") and the old
    // blocker-text regex.
    if(init.awaiting_user) return {band:'needs_you', reason:init.awaiting_user, since};
    if(dun) return {band:'done_unread', reason:'AI 已完成,待你查看', since};
    // Only let 'done'/'paused' collapse the card when the session ISN'T still open.
    if(!idle){
      if(init.status==='done') return {band:'done'};
      if(init.status==='paused'){
        // recently-touched parked work still shows (as idle); only long-dormant
        // paused collapses — so "近期的" cards aren't hidden.
        const iso=init.last_activity_at; const days=iso?(Date.now()-Date.parse(iso))/86400000:999;
        return days<=4 ? {band:'idle'} : {band:'paused'};
      }
    }
    const blk=(init.blockers||[]).find(b=>NEEDS_RE.test(b));
    if(blk) return {band:'needs_you', reason:blk};
    return {band:'idle'};
  }
  function buildRows(){
    const rows=[];
    for(const w of (MINDMAP.workspaces||[])){ for(const init of (w.initiatives||[])){
      const b=bandFor(init); const iso=b.since||init.last_activity_at; const tasks=init.tasks||[];
      rows.push({ id:init.id, name:init.name, ws:w.name, status:init.status, level:init.level,
        band:b.band, reason:b.reason, activity:b.activity, pct:b.pct,
        idle:humanIdle(iso), idle_secs:idleSecs(iso),
        artifacts:init.artifacts||[], blockers:init.blockers||[], code_location:init.code_location||null,
        tasks_total:tasks.length, tasks_pending:tasks.filter(x=>(x.status||(x.done?'done':'pending'))==='pending').length,
        sessions:init.sessions||[], n_sessions:(init.sessions||[]).length,
        session:(init.sessions||[])[0]||init.origin_session||null,
        sealed:!!init.sealed, origin_session:init.origin_session||null, fresh:!!init._fresh,
        parent_session_id:init.parent_session_id||null, pending:!!init._pending,
        next_step:init.next_step||null, awaiting_user:init.awaiting_user||null,
        progress:init.progress, summary:init.summary });
    }}
    // Archiving a card = "done & filed away". Surface THIS WEEK's archived ones in
    // the 本周完成 band so it reflects what you finished this week. Older archives
    // stay only in the 归档 weekly view, to avoid flooding the band.
    const _seen=new Set(rows.map(r=>r.id)), weekStart=weekStartTs();
    for(const a of (ARCHIVED||[])){ const init=a.init||{}; if(!init.id||_seen.has(init.id))continue;
      const iso=a.archived_at||init.last_activity_at; if(Date.parse(iso)<weekStart)continue;
      const tasks=init.tasks||[];
      rows.push({ id:init.id, name:init.name, ws:a.ws_name||'', status:'archived', level:init.level,
        band:'done', reason:'已归档', idle:humanIdle(iso), idle_secs:idleSecs(iso),
        artifacts:init.artifacts||[], blockers:[], tasks_total:tasks.length, tasks_pending:0,
        sessions:init.sessions||[], n_sessions:(init.sessions||[]).length,
        session:(init.sessions||[])[0]||init.origin_session||null,
        sealed:!!init.sealed, origin_session:init.origin_session||null, archived:true,
        next_step:null, awaiting_user:null, progress:init.progress, summary:init.summary }); }
    rows.sort((a,b)=>RANK[a.band]-RANK[b.band]||b.idle_secs-a.idle_secs);
    const top=groupSubcards(rows);   // DD-025: nest sub-cards under their parent
    const counts={}; top.forEach(r=>counts[r.band]=(counts[r.band]||0)+1);
    DATA={counts, rows:top, allRows:rows};
  }
  // DD-025: attach each sub-card (parent_session_id → a known card's session) to
  // its parent as r.children, and return the top-level rows (children removed, so
  // they render nested, not twice). Pure — node-checked.
  function groupSubcards(rows){
    const bySid=new Map();
    for(const r of rows) for(const s of (r.sessions||[])) if(s&&!bySid.has(s)) bySid.set(s,r);
    const childIds=new Set();
    for(const r of rows){ const p=r.parent_session_id;
      if(p&&bySid.has(p)&&bySid.get(p)!==r){ const par=bySid.get(p);
        (par.children=par.children||[]).push(r); childIds.add(r.id); r.is_subcard=true; } }
    // 交互优化: a parent's PLACEMENT band rolls up its sub-cards. If the parent's
    // own turn ended (done_unread) while a sub-card is still running, the whole
    // card belongs in 进行中 — not 待查看. needs_you stays top (most actionable).
    // We keep the parent's own band in _own_band for its detail content.
    for(const r of rows){ if(r.children&&r.children.length){
      // A more-urgent child may bubble up onto a CALM parent so a buried needy
      // sub-card isn't missed. But if the parent is itself active — running (you're
      // talking to it) or needs_you (its OWN awaiting_user) — its own band WINS;
      // child attention then shows only via the ⑃ badge, never by masking the
      // parent's own state. (Fix: a sub-card's needs_you used to hijack a running
      // main card so it never showed 进行中 while you worked in it.)
      if(r.band==='running'||r.band==='needs_you') continue;
      let best=r.band;
      for(const c of r.children){ if((FAM_RANK[c.band]??9)<(FAM_RANK[best]??9)) best=c.band; }
      if(best!==r.band){ r._own_band=r.band; r.band=best;
        if(best==='running') r.activity=r.activity||'子卡进行中';
        else if(best==='needs_you'){ const cn=r.children.find(c=>c.band==='needs_you'); if(cn&&!r.reason) r.reason=cn.reason||'子卡等你确认'; } } } }
    return rows.filter(r=>!childIds.has(r.id));
  }
  // roll-up of a parent's children: counts by band for the parent's badge
  function subRollup(ch){const c={total:ch.length,needs:0,done:0,running:0};
    for(const r of ch){ if(r.band==='needs_you')c.needs++; else if(r.band==='done'||r.band==='done_unread')c.done++; else if(r.band==='running')c.running++; } return c;}
  function renderCurrent(){ const v=document.body.dataset.view; if(v==='archive')return renderArchive(); v==='attention'?renderAttention():renderProject(); }
  // 归档周视图:已完成/归档的工作按 ISO 周分组,每周一句话小结
  async function renderArchive(){
    mini.innerHTML='';
    board.innerHTML='<div style="padding:40px;text-align:center;color:var(--ink-faint)">加载归档…</div>';
    try{
      const j=await fetch(ORIGIN+'/api/archive-weeks').then(r=>r.json());
      const weeks=j.weeks||[];
      if(!weeks.length){ board.innerHTML='<div style="padding:48px;text-align:center;color:var(--ink-faint)">还没有完成 / 归档的工作</div>'; return; }
      board.innerHTML=weeks.map(w=>{
        const byWs={}; (w.items||[]).forEach(it=>{(byWs[it.ws]=byWs[it.ws]||[]).push(it);});

  const RES_EXTERNAL=new Set(['mr','pr','cr','issue','deployment','doc','other']);

  const httpUrl=a=>{const u=(a&&a.url||'').trim();return /^https?:\/\//i.test(u)?u:'';};

  // 取 progress 首句,让搁置/空闲的卡在列表行也能瞥见最新进展(完整文本进 tooltip)

  // ATTENTION view

  // PROJECT view (tiers + minimap + draggable + item strips)
  function projectAgg(){
    const act=DATA.rows.filter(r=>['needs_you','done_unread','running','idle'].includes(r.band));
    const byWs={};act.forEach(r=>(byWs[r.ws]=byWs[r.ws]||[]).push(r));
    return Object.keys(byWs).map(ws=>{const rows=byWs[ws].sort((a,b)=>RANK[a.band]-RANK[b.band]||b.idle_secs-a.idle_secs);
      const n=k=>rows.filter(r=>r.band===k).length;
      const urg=rows.some(r=>r.band==='needs_you'||r.band==='done_unread')?2:(rows.some(r=>r.band==='running')?1:0);
      return {ws,rows,tier:tierOf(ws),needs:n('needs_you'),dun:n('done_unread'),run:n('running'),idleN:n('idle'),urg,recency:Math.min.apply(null,rows.map(r=>r.idle_secs))};});
  }
  function sortProjs(arr,tier){const ord=loadOrder(tier);
    if(ord)return arr.slice().sort((a,b)=>{const ia=ord.indexOf(a.ws),ib=ord.indexOf(b.ws);return (ia<0?999:ia)-(ib<0?999:ib)||b.urg-a.urg;});
    return arr.slice().sort((a,b)=>b.urg-a.urg||a.recency-b.recency);}
  function streamLine(p,open){
    const counts=`${p.rows.length} 件`+(p.needs?` · <span class="amb">${p.needs} 等你</span>`:'')+(p.dun?` · <span class="gdone">${p.dun} 待查看</span>`:'')+(p.run?` · <span class="run">${p.run} 跑</span>`:'')+(p.idleN?` · <span class="dim">${p.idleN} 闲</span>`:'');

  function renderProject(){

  // wiring
  function wire(){
    board.querySelectorAll('.band-head.clickable').forEach(h=>h.addEventListener('click',()=>h.closest('.band').classList.toggle('collapsed')));

      // don't treat the mouse-up as a toggle — let the selection stand.
      const sel=window.getSelection();if(sel&&sel.toString()&&sel.anchorNode&&row.contains(sel.anchorNode))return;

    if(mh)mh.addEventListener('click',()=>{mini.classList.toggle('mclosed');if(!mini.classList.contains('mclosed'))requestAnimationFrame(drawMindLinks);});
    if(location.hash.indexOf('open')>=0){const m=location.hash.match(/open=?(\d+)?/),rows=board.querySelectorAll('.row'),idx=m&&m[1]?parseInt(m[1]):0;if(rows[idx])rows[idx].classList.add('open');}
    // re-apply preserved UI state so a background refresh never collapses your view
    board.querySelectorAll('.proj').forEach(sec=>{const v=PCOLLAPSE[sec.dataset.ws];if(v==='o')sec.classList.remove('collapsed');else if(v==='c')sec.classList.add('collapsed');});

  function drawMindLinks(){

    const curve=(a,b)=>{const mx=(a.x+b.x)/2;return 'M'+a.x.toFixed(1)+','+a.y.toFixed(1)+' C'+mx.toFixed(1)+','+a.y.toFixed(1)+' '+mx.toFixed(1)+','+b.y.toFixed(1)+' '+b.x.toFixed(1)+','+b.y.toFixed(1);};

  function enter(e){ if(e&&e.stopPropagation)e.stopPropagation(); }  // legacy [→] in row: no-op (use detail buttons)

  // DD-025: close a sub-card — removes the card AND deletes its git worktree + branch.
  async function closeSubcard(e,sid,id,name){ if(e)e.stopPropagation(); if(!sid)return;

  // Two-phase close: the first request is NOT forced. The server live-guard
  // refuses (409 needs_confirm) when the session is still running / has a live
  // terminal / has uncommitted changes — irreversible loss the small × button
  // shouldn't cause on a misclick. Only an explicit hard-confirm retries forced.
  async function _closeSubcardReq(sid,id,force){
    toast(force?'强制关闭子卡 + 删 worktree…':'正在关闭子卡 + 删 worktree…');
    try{ const r=await fetch(ORIGIN+'/api/subcard-close',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({sid,id,force})});
      const j=await r.json().catch(()=>({}));
      if(r.status===409&&j.needs_confirm){
        const why=j.hint||'该子卡还在使用中';
        if(confirm('⚠️ 这张子卡还不该删:\n  '+why+'\n\n仍要强制删除 worktree + 分支吗?未提交的改动将永久丢失,正在运行的会话会被终止。')){
          return _closeSubcardReq(sid,id,true);

  // DD-015 Stage 3a: read-only recent conversation

  function viewHistory(e,sid){ e.stopPropagation(); if(!sid){toast('该工作没有关联会话');return;}

  // Send a message into the session's live zellij pane (drives the real claude)

  async function openTerminal(e,sid,force){ if(e&&e.stopPropagation)e.stopPropagation();

  function showTermLoading(msg,sub){ const m=document.getElementById('termModal'); if(!m)return;

  function renderTermTimeline(sid){

    document.body.appendChild(dlg);
    const inp=dlg.querySelector('#nsCwd'); inp.focus(); inp.select();
    const wt=dlg.querySelector('#nsWt');
    const close=()=>dlg.remove();
    dlg.querySelectorAll('.nschip').forEach(ch=>ch.addEventListener('click',()=>{inp.value=ch.dataset.cwd;inp.focus();}));
    dlg.addEventListener('click',e=>{ if(e.target===dlg)close(); });
    dlg.querySelector('#nsCancel').addEventListener('click',close);
    const go=()=>{ const cwd=inp.value.trim(); const o={worktree:wt.checked}; close(); startNewSession(cwd,o); };
    dlg.querySelector('#nsGo').addEventListener('click',go);
    inp.addEventListener('keydown',e=>{ if(e.key==='Enter')go(); if(e.key==='Escape')close(); });
  }
  async function startNewSession(cwd,opts){
    opts=opts||{};
    const m=getTermModal(); m.style.display='flex';
    showTermLoading(opts.worktree?'正在新建 worktree + 会话…':'正在新建会话 · 启动终端…',
      opts.worktree?('在 '+(cwd||'~')+' 建一个 git worktree 并起 claude,几秒'):('在 '+(cwd||'~')+' 里开一条新的 claude,几秒'));
    try{
      const r=await fetch(ORIGIN+'/api/new-session',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({cwd,worktree:!!opts.worktree,name:opts.name||''})});
      const j=await r.json().catch(()=>({}));
      if(r.ok&&j.url){ addTerm(j.token,j.url); setActiveTerm(j.token); loadData(); return; }  // DD-027: 占位卡即时上板
      hideTermLoading();
      if(String(j.error||'').indexOf('ttyd')>=0){ toast('未装 ttyd:brew install ttyd'); return; }
      toast((j.error==='not a directory'?'目录不存在:':'')+(j.hint||j.error||'新建会话失败'));
    }catch(_){ hideTermLoading(); toast('新建会话失败'); }
  }
  (function(){ const nb=document.getElementById('newTaskBtn'); if(nb)nb.addEventListener('click',newSession); })();
  (function(){ const b=document.getElementById('collapseAllBtn'); if(b)b.addEventListener('click',()=>{ OPEN.clear(); document.querySelectorAll('.row.open').forEach(r=>r.classList.remove('open')); toast('已收起全部卡片'); }); })();
  // ── 键盘交互层 (交互优化) ──────────────────────────────────────────────
  // Esc 关掉最上层的弹层;不打字 / 不在内嵌终端里时,单键直驱高频操作。
  // 注意:焦点在终端 iframe 内时,keydown 进不了父文档 —— 所以在终端里敲
  // Esc / 单键不会误触(vim 用户安全),要关终端就点「关闭」或背景。
  function topOverlay(){
    const k=document.getElementById('kbdHelp'); if(k) return ()=>k.remove();
    const ns=document.getElementById('nsDlg'); if(ns) return ()=>ns.remove();
    const tm=document.getElementById('termModal'); if(tm&&tm.style.display!=='none') return hideTerm;
    if(document.getElementById('suggModal')) return closeSugg;
    if(document.getElementById('histModal')) return closeHist;
    return null;
  }
  function typingInField(){ const a=document.activeElement;
    return !!a&&(a.tagName==='INPUT'||a.tagName==='TEXTAREA'||a.tagName==='SELECT'||a.isContentEditable); }
  function showKbdHelp(){
    let m=document.getElementById('kbdHelp');
    if(m){ m.remove(); return; }   // 再按一次 ? 关掉
    m=document.createElement('div'); m.id='kbdHelp'; m.className='histmask';
    const rows=[['n','新建任务'],['r','刷新(重新分析最近会话)'],['c','收起全部卡片'],
      ['t','切换昼夜'],['1 / 2 / 3','按项目 / 按注意力 / 归档'],
      ['Esc','关闭弹层(终端 / 对话 / 建议 / 新建)'],['?','显示 / 关闭本帮助']];
    m.innerHTML=`<div class="kbdbox"><div class="kbdhead"><span>键盘快捷键</span><button class="btn" onclick="document.getElementById('kbdHelp').remove()">关闭</button></div><div class="kbdbody">`+
      rows.map(([k,d])=>`<div class="kbdrow"><span class="kbdkeys">${k.split(' / ').map(x=>`<kbd>${esc(x)}</kbd>`).join('<span style="color:var(--ink-faint)">/</span>')}</span><span class="kbddesc">${esc(d)}</span></div>`).join('')+
      `</div></div>`;
    m.onclick=ev=>{ if(ev.target===m) m.remove(); };
    document.body.appendChild(m);
  }
  document.addEventListener('keydown',e=>{
    if(e.metaKey||e.ctrlKey||e.altKey) return;          // 留给浏览器 / 系统快捷键
    if(e.key==='Escape'){ const c=topOverlay(); if(c){ e.preventDefault(); c(); } return; }
    if(typingInField()) return;                          // 输入框里只走 Esc
    if(e.key==='?'){ e.preventDefault(); showKbdHelp(); return; }
    if(topOverlay()) return;                             // 有弹层时不触发其余加速键
    switch(e.key){
      case 'n': e.preventDefault(); newSession(); break;
      case 'r': e.preventDefault(); document.getElementById('refreshBtn')?.click(); break;
      case 'c': e.preventDefault(); document.getElementById('collapseAllBtn')?.click(); break;
      case 't': e.preventDefault(); document.getElementById('themetog')?.click(); break;
      case '1': e.preventDefault(); setView('project'); break;
      case '2': e.preventDefault(); setView('attention'); break;
      case '3': e.preventDefault(); setView('archive'); break;
    }
  });
  if(location.hash.indexOf('hist=')>=0){ const s=decodeURIComponent(location.hash.split('hist=')[1]); setTimeout(()=>viewHistory({stopPropagation(){}}, s), 900); }

  // ── 桌宠 + tips 气泡引擎 (DD-006,从 render-html.py/classic 迁移) ─────────
  // 走动的像素猫 + 轮播 AI tips。数据来自 /api/derived 的 tips 字段(serve.py
  // 的 DD-006 derived 调度器生成,与页面无关)。点击换下一句,拖动可移动,
  // 位置存 localStorage。猫纯 CSS 动画,JS 只换气泡颜色(data-kind)+ 文案。
  (function(){
    const $bubble=document.getElementById('tips-ticker');
    if(!$bubble) return;
    const $lead=document.getElementById('tt-lead');
    const $text=document.getElementById('tt-text');
    const $source=document.getElementById('tt-source');
    const TIP_LEAD={work:'嘿,顺手说一句:',wisdom:'嗯…',rest:'歇会儿?',curiosity:'你知道吗:'};
    const HINT='点一下听下一句';
    let pool=[], idx=0, timer=null;

    // Fisher-Yates 洗牌:走完一轮乱序池前每条只出现一次,且避免跨边界同类相邻。
    function shuffle(prevKind){
      for(let i=pool.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[pool[i],pool[j]]=[pool[j],pool[i]];}
      if(prevKind&&pool.length>1&&pool[0].kind===prevKind){
        for(let i=1;i<pool.length;i++){if(pool[i].kind!==prevKind){[pool[0],pool[i]]=[pool[i],pool[0]];break;}}
      }
    }
    function renderAt(i){
      if(!pool.length) return;
      if(i>=pool.length) shuffle(pool[idx]&&pool[idx].kind);
      idx=((i%pool.length)+pool.length)%pool.length;
      const t=pool[idx], kind=t.kind||'wisdom';
      $bubble.setAttribute('data-kind',kind);
      const lead=TIP_LEAD[kind]||'';
      $lead.textContent=lead; $lead.style.display=lead?'block':'none';
      $text.textContent=t.text||'';
      const url=t.source_url||'';
      if(url&&/^https?:\/\//i.test(url)){ $source.href=url; $source.hidden=false; }
      else { $source.removeAttribute('href'); $source.hidden=true; }
      $bubble.title=(t.text||'')+'  ·  '+HINT;
      $bubble.classList.remove('cycling'); void $bubble.offsetWidth; $bubble.classList.add('cycling');
    }
    function schedule(){ if(timer)clearInterval(timer); if(pool.length<2)return; timer=setInterval(()=>renderAt(idx+1),25*1000); }

    // 拖动定位(left/top,存 localStorage)+ 点击换句。>4px 才算拖动。
    const POS_KEY='cockpit-tips-pos', THRESH=4;
    function clamp(left,top){const r=$bubble.getBoundingClientRect();
      return {left:Math.min(Math.max(0,left),Math.max(0,innerWidth-r.width-4)),
              top:Math.min(Math.max(0,top),Math.max(0,innerHeight-r.height-4))};}
    function place(left,top){const c=clamp(left,top);
      $bubble.style.left=c.left+'px'; $bubble.style.top=c.top+'px';
      $bubble.style.right='auto'; $bubble.style.bottom='auto';}
    try{const s=JSON.parse(localStorage.getItem(POS_KEY)||'null');
      if(s&&Number.isFinite(s.left)&&Number.isFinite(s.top)) requestAnimationFrame(()=>place(s.left,s.top));
    }catch(e){}
    let drag=null, suppressClick=false;
    $bubble.addEventListener('mousedown',ev=>{
      if(ev.target.closest('.tt-source'))return; if(ev.button!==0)return;
      const r=$bubble.getBoundingClientRect();
      drag={startX:ev.clientX,startY:ev.clientY,origLeft:r.left,origTop:r.top,moved:false}; ev.preventDefault();});
    document.addEventListener('mousemove',ev=>{
      if(!drag)return; const dx=ev.clientX-drag.startX, dy=ev.clientY-drag.startY;
      if(!drag.moved&&(Math.abs(dx)>THRESH||Math.abs(dy)>THRESH)){drag.moved=true;$bubble.classList.add('dragging');}
      if(drag.moved) place(drag.origLeft+dx,drag.origTop+dy);});
    document.addEventListener('mouseup',()=>{
      if(!drag)return;
      if(drag.moved){$bubble.classList.remove('dragging');
        try{const r=$bubble.getBoundingClientRect();localStorage.setItem(POS_KEY,JSON.stringify({left:r.left,top:r.top}));}catch(e){}
        suppressClick=true; setTimeout(()=>{suppressClick=false;},0);}
      drag=null;});
    $bubble.addEventListener('click',ev=>{
      if(suppressClick)return; if(ev.target.closest('.tt-source'))return; if(!pool.length)return;
      renderAt(idx+1); schedule();});
    addEventListener('resize',()=>{ if(!$bubble.style.left)return;
      const l=parseFloat($bubble.style.left), t=parseFloat($bubble.style.top);
      if(Number.isFinite(l)&&Number.isFinite(t)) place(l,t);});

    // 拉取函数。只取 /api/derived 的 tips 片段(驾驶舱没有 classic 的其它
    // sidebar widgets)。失败/无数据时气泡保持隐藏。
    async function loadTips(){
      try{
        const r=await fetch(ORIGIN+'/api/derived'); if(!r.ok)return;
        const d=await r.json();
        let tips=null;
        if(d.tips&&Array.isArray(d.tips.tips)&&d.tips.tips.length) tips=d.tips.tips.slice();
        else if(d.tips&&d.tips.tip) tips=[{kind:d.tips.pattern?'work':'wisdom',text:d.tips.tip}];  // v1 兼容
        if(!tips){ $bubble.hidden=true; return; }
        pool=tips; shuffle(); idx=0; renderAt(0); schedule(); $bubble.hidden=false;
      }catch(e){ /* 网络/解析失败 → 不显示桌宠,不报错 */ }
    }
    // 首屏拉一次,之后每 10min 刷新池子(tips 由 serve.py 每 2h 生成)。
    loadTips(); setInterval(loadTips, 10*60*1000);
  })();
  </script>
</body>
